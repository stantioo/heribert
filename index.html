// Convert HTML (as used in card questionHtml/answerHtml) to plain text,
// keeping paragraph structure as newlines.
function htmlToPlainText(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  let out = "";
  const walk = n => {
    if (n.nodeType === 3) { out += n.textContent; return; }
    if (n.nodeName === "BR") { out += "\n"; return; }
    if (/^(P|DIV|LI|H[1-6])$/.test(n.nodeName) && out && !out.endsWith("\n")) out += "\n";
    for (const c of n.childNodes) walk(c);
    if (/^(P|DIV|LI|H[1-6])$/.test(n.nodeName) && !out.endsWith("\n")) out += "\n";
  };
  walk(div);
  return out.replace(/\n{3,}/g, "\n\n").trim();
}

function csvEscape(s) {
  const str = String(s ?? "").replace(/"/g, '""');
  return /[",\n\r]/.test(str) ? `"${str}"` : str;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function safeFilename(s) {
  return String(s || "Set").replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, " ").trim().slice(0, 80) || "Set";
}

function exportSetCSV(set, cards) {
  const header = ["Frage","Antwort"].map(csvEscape).join(",");
  const rows = cards.map(c => [csvEscape(htmlToPlainText(c.questionHtml)), csvEscape(htmlToPlainText(c.answerHtml))].join(","));
  const csv = "\uFEFF" + [header, ...rows].join("\r\n");
  downloadBlob(new Blob([csv], {type:"text/csv;charset=utf-8"}), `${safeFilename(set.name)}.csv`);
}

// Generate 3 plausible wrong answers for MCQ mode.
// Calls the "generate-mcq" Supabase Edge Function, which holds the OpenAI key server-side.
async function genMCQ(q, a) {
  try {
    const {data, error} = await sb.functions.invoke("generate-mcq", {
      body: { question: strip(q).slice(0, 180), answer: strip(a).slice(0, 180) }
    });
    if (error) { console.warn("MCQ-Generation fehlgeschlagen:", error); return null; }
    if (data && Array.isArray(data.answers) && data.answers.length >= 3) {
      return data.answers.slice(0, 3).map(x => String(x));
    }
  } catch (e) { console.warn("MCQ-Generation fehlgeschlagen:", e); }
  return null;
}

// \u2500\u2500\u2500 APP ROOT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function useMobile(){
  const [m,setM]=useState(window.innerWidth<768);
  useEffect(()=>{const h=()=>setM(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return m;
}

function SplashScreen({name,onDone}){
  const E=["🎯","📚","⚡","🚀","✨","🧠"][Math.floor(Math.random()*6)];
  useEffect(()=>{const t=setTimeout(onDone,1900);return()=>clearTimeout(t);},[]);
  return(
    <div className="splash-out" style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#FFFAF7,#FFF8F4)"}}>
      <div className="splash-in" style={{textAlign:"center"}}>
        <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:22,background:"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:16}}>Heribert ✦</div>
        <div style={{fontSize:52,marginBottom:16}}>{E}</div>
        <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:22,color:"var(--text)",marginBottom:8}}>Willkommen zurück, {name}!</div>
        <div style={{fontSize:14,color:"var(--muted)"}}>Weiter geht's 👋</div>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(undefined);
  const [splash,setSplash]=useState(false);
  useEffect(() => {
    const lk = document.createElement("link"); lk.rel="stylesheet"; lk.href=FONTS; document.head.appendChild(lk);
    const st = document.createElement("style"); st.textContent=CSS; document.head.appendChild(st);
    sb.auth.getSession().then(({data:{session}}) => { setSession(session); if(session) setSplash(true); });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_e,s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  if (session === undefined) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:28,background:"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:20}}>Heribert ✦</div>
        <ISpin/>
      </div>
    </div>
  );

  if (!session) return <AuthScreen/>;
  const uname=(session.user.user_metadata?.display_name||session.user.email.split("@")[0]).split(" ")[0];
  return(<>{splash&&<SplashScreen name={uname} onDone={()=>setSplash(false)}/>}<Dashboard key={session.user.id} session={session} onLogout={()=>sb.auth.signOut()}/></>);
}

// \u2500\u2500\u2500 AUTH \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function AuthScreen() {
  const [tab, setTab] = useState("login");
  const [f, setF] = useState({name:"",email:"",pw:""});
  const [err, setErr] = useState(""); const [info, setInfo] = useState(""); const [busy, setBusy] = useState(false);
  const up = k => v => setF(p => ({...p,[k]:v}));
  const submit = async () => {
    setErr(""); setInfo(""); setBusy(true);
    try {
      if (tab === "login") {
        const {error} = await sb.auth.signInWithPassword({email:f.email, password:f.pw});
        if (error) setErr(error.message === "Invalid login credentials" ? "E-Mail oder Passwort falsch." : error.message);
      } else {
        if (!f.name.trim()) { setErr("Bitte Namen eingeben."); return; }
        if (!f.email.includes("@")) { setErr("Ung\u00fcltige E-Mail."); return; }
        if (f.pw.length < 6) { setErr("Passwort mind. 6 Zeichen."); return; }
        const path = window.location.pathname;
        const emailRedirectTo = window.location.origin + path.substring(0, path.lastIndexOf("/") + 1) + "confirmed.html";
        const {error} = await sb.auth.signUp({email:f.email, password:f.pw, options:{data:{display_name:f.name.trim()}, emailRedirectTo}});
        if (error) setErr(error.message);
        else setInfo("\u2713 Best\u00e4tigungs-E-Mail gesendet. E-Mail best\u00e4tigen, dann anmelden.");
      }
    } finally { setBusy(false); }
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)"}}>
      <div className="au" style={{background:"linear-gradient(180deg,#FFF,#FEFCFA)",borderRadius:24,padding:"44px 40px",width:"100%",maxWidth:420,boxShadow:"0 8px 48px rgba(245,99,26,.1),0 0 0 1px rgba(245,99,26,.06)"}}>
        <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:28,background:"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>Heribert ✦</div>
        <div style={{color:"var(--muted)",fontSize:14,marginBottom:30}}>Deine persönliche Lernplattform</div>
        <div style={{display:"flex",background:"linear-gradient(160deg,#F5F3EF,#EDEAE4)",borderRadius:10,padding:4,marginBottom:26,gap:4}}>
          {["login","register"].map(t => (
            <button key={t} onClick={() => {setTab(t);setErr("");setInfo("");}} style={{flex:1,padding:"9px",border:"none",borderRadius:8,background:tab===t?"linear-gradient(160deg,#FFF,#FEFCFA)":"transparent",color:tab===t?"var(--text)":"var(--muted)",fontWeight:tab===t?600:400,fontSize:14,cursor:"pointer",boxShadow:tab===t?"0 1px 4px rgba(0,0,0,.08)":"none",transition:"all .15s",fontFamily:"inherit"}}>
              {t==="login"?"Anmelden":"Registrieren"}
            </button>
          ))}
        </div>
        {tab==="register" && <Inp label="Name" placeholder="Dein Name" value={f.name} onChange={up("name")}/>}
        <Inp label="E-Mail" type="email" placeholder="du@beispiel.de" value={f.email} onChange={up("email")}/>
        <Inp label="Passwort" type="password" placeholder="••••••••" value={f.pw} onChange={up("pw")} onEnter={submit}/>
        {err && <div style={{color:"var(--red)",fontSize:13,marginBottom:14,padding:"10px 14px",background:"var(--rl)",borderRadius:8}}>{err}</div>}
        {info && <div style={{color:"var(--green)",fontSize:13,marginBottom:14,padding:"10px 14px",background:"var(--gl)",borderRadius:8}}>{info}</div>}
        <button className="btn-o" onClick={submit} disabled={busy} style={{width:"100%",padding:"12px",justifyContent:"center",fontSize:15,fontWeight:600,borderRadius:12,opacity:busy?.7:1}}>
          {busy ? <ISpin c="#fff" s={18}/> : (tab==="login" ? "Anmelden" : "Account erstellen")}
        </button>
      </div>
    </div>
  );
}


// \u2500\u2500\u2500 DASHBOARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function Dashboard({session, onLogout}) {
  const user = session.user;
  const userName = user.user_metadata?.display_name || user.email.split("@")[0];
  const [data, setData] = useState({folders:[], sets:[], cards:[], shares:[]});
  const [loading, setLoading] = useState(true);
  const [sel, setSel] = useState({folderId:null, setId:null});
  const [studyConfig, setStudyConfig] = useState(null);
  const [studyMode, setStudyMode] = useState(null);
  const [modal, setModal] = useState(null);
  const [editCard, setEditCard] = useState(null);
  const [profileOpen, setProfileOpen] = useState(false);
  const [saving, setSaving] = useState(false);
  const mobile=useMobile();
  const [menuOpen,setMenuOpen]=useState(false);

  useEffect(() => { loadAll(); }, []);
  const loadAll = async () => {
    setLoading(true);
    // Load all data. RLS ensures we only see our own sets + sets shared with us.
    // We also pull set_shares so we know which sets are "shared with me" vs. owned.
    const [fr,sr,cr,shr] = await Promise.all([
      sb.from("folders").select("*").order("created_at"),
      sb.from("sets").select("*").order("created_at"),
      sb.from("cards").select("*").order("created_at"),
      sb.from("set_shares").select("*"),
    ]);
    const shares = shr.data || [];
    const myEmail = (user.email || "").toLowerCase();
    // Mark sets we don't own as shared-with-me
    const sets = (sr.data||[]).map(r => {
      const s = toSet(r);
      s.ownerId = r.user_id;
      s.isSharedWithMe = r.user_id !== user.id;
      if (s.isSharedWithMe) {
        const sh = shares.find(x => x.set_id === s.id && (x.invited_email || "").toLowerCase() === myEmail);
        s.sharedBy = sh?.owner_email || null;
      }
      return s;
    });
    setData({
      folders:(fr.data||[]).map(toFolder),
      sets,
      cards:(cr.data||[]).map(toCard),
      shares: shares.filter(x => x.owner_id === user.id),
    });
    setLoading(false);
  };

  const createFolder = async (name,color) => { const id=uid(); await sb.from("folders").insert({id,user_id:user.id,name,color,parent_id:null}); setData(d=>({...d,folders:[...d.folders,{id,name,color,parentId:null}]})); setModal(null); };
  const removeFolder = async (fid) => { await sb.from("folders").delete().eq("id",fid); setData(d=>{const sids=d.sets.filter(s=>s.folderId===fid).map(s=>s.id);return{folders:d.folders.filter(f=>f.id!==fid),sets:d.sets.filter(s=>s.folderId!==fid),cards:d.cards.filter(c=>!sids.includes(c.setId))};});if(sel.folderId===fid)setSel({folderId:null,setId:null}); };
  const renameFolder = async (fid,name) => { await sb.from("folders").update({name}).eq("id",fid); setData(d=>({...d,folders:d.folders.map(f=>f.id===fid?{...f,name}:f)})); };
  const createSet = async (name,desc) => { const id=uid(); await sb.from("sets").insert({id,user_id:user.id,folder_id:sel.folderId,name,description:desc,created_at:new Date().toISOString()}); setData(d=>({...d,sets:[...d.sets,{id,folderId:sel.folderId,name,description:desc,createdAt:new Date().toISOString()}]})); setModal(null); };
  const removeSet = async (sid) => { await sb.from("sets").delete().eq("id",sid); setData(d=>({...d,sets:d.sets.filter(s=>s.id!==sid),cards:d.cards.filter(c=>c.setId!==sid)})); if(sel.setId===sid)setSel(p=>({...p,setId:null})); };
  const renameSet = async (sid,name) => { await sb.from("sets").update({name}).eq("id",sid); setData(d=>({...d,sets:d.sets.map(s=>s.id===sid?{...s,name}:s)})); };

  const saveCard = async (card) => {
    const isNew = !card.id; setSaving(true);
    if (isNew) {
      const id=uid(); const now=new Date().toISOString();
      await sb.from("cards").insert({id,user_id:user.id,set_id:sel.setId,question_html:card.questionHtml,answer_html:card.answerHtml,last_rating:null,mcq_options:null,created_at:now});
      setData(d=>({...d,cards:[...d.cards,{id,setId:sel.setId,questionHtml:card.questionHtml,answerHtml:card.answerHtml,lastRating:null,mcqOptions:null,createdAt:now}]}));
    } else {
      await sb.from("cards").update({question_html:card.questionHtml,answer_html:card.answerHtml,mcq_options:null}).eq("id",card.id);
      setData(d=>({...d,cards:d.cards.map(c=>c.id===card.id?{...c,questionHtml:card.questionHtml,answerHtml:card.answerHtml,mcqOptions:null}:c)}));
    }
    setSaving(false); setEditCard(null); setModal(null);
  };
  const removeCard = async (cid) => { await sb.from("cards").delete().eq("id",cid); setData(d=>({...d,cards:d.cards.filter(c=>c.id!==cid)})); };
  const updateCardRating = async (cid,rating) => { await sb.from("cards").update({last_rating:rating}).eq("id",cid); setData(d=>({...d,cards:d.cards.map(c=>c.id===cid?{...c,lastRating:rating}:c)})); };
  const cacheCardMCQ = async (cid,opts) => { await sb.from("cards").update({mcq_options:opts}).eq("id",cid); setData(d=>({...d,cards:d.cards.map(c=>c.id===cid?{...c,mcqOptions:opts}:c)})); };

  const importPDF = async (file) => {
    setModal({type:"pdfLoading", stage:"extract", info:`Lese ${file.name}…`});
    try {
      if (!window.pdfjsLib) {
        await new Promise((res,rej) => { const s=document.createElement("script");s.src=PDFJS;s.onload=res;s.onerror=rej;document.head.appendChild(s); });
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
      // 1) Extract full text from PDF (all pages concatenated, no heuristics)
      const buf = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({data:buf}).promise;
      const pagesTxt = [];
      for (let p=1; p<=pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();
        // Group items by y-position to rebuild lines
        const sorted = [...tc.items].sort((a,b)=>b.transform[5]-a.transform[5]);
        const lines=[]; let lastY=null; let cur=[];
        for (const item of sorted) {
          const y=Math.round(item.transform[5]);
          if(lastY===null||Math.abs(y-lastY)>4){if(cur.length)lines.push(cur.join(" ").trim());cur=[item.str];lastY=y;}
          else cur.push(item.str);
        }
        if (cur.length) lines.push(cur.join(" ").trim());
        pagesTxt.push(lines.filter(l=>l.trim()).join("\n"));
      }
      const fullText = pagesTxt.filter(t=>t.length>0).join("\n\n---\n\n").trim();
      if (fullText.length < 50) { setModal({type:"pdfError",msg:"Konnte keinen auswertbaren Text aus dem PDF extrahieren."}); return; }

      // 2) Ask Gemini (via Edge Function) to generate Q/A cards
      setModal({type:"pdfLoading", stage:"generate", info:`${pdf.numPages} Seite${pdf.numPages===1?"":"n"} · Gemini erstellt Karteikarten…`});
      const {data, error} = await sb.functions.invoke("generate-cards", {
        body: { text: fullText }
      });
      if (error) { setModal({type:"pdfError",msg:`Fehler bei KI-Generierung: ${error.message||error}`}); return; }
      const cards = data?.cards || [];
      if (!cards.length) { setModal({type:"pdfError",msg:data?.error||"Gemini hat keine Karten generiert."}); return; }

      // 3) Show preview modal; user confirms → insert into DB
      setModal({type:"pdfPreview", cards, sourceName:file.name, pages:pdf.numPages});
    } catch(e) {
      setModal({type:"pdfError",msg:e.message});
    }
  };

  const confirmPDFImport = async (approvedCards) => {
    if (!approvedCards.length || !sel.setId) { setModal(null); return; }
    const now = new Date().toISOString();
    const rows = approvedCards.map(c => ({
      id:uid(), user_id:user.id, set_id:sel.setId,
      question_html:`<p>${esc(c.q)}</p>`,
      answer_html:`<p>${esc(c.a)}</p>`,
      last_rating:null, mcq_options:null, created_at:now,
    }));
    await sb.from("cards").insert(rows);
    setData(d=>({...d,cards:[...d.cards,...rows.map(r=>({id:r.id,setId:r.set_id,questionHtml:r.question_html,answerHtml:r.answer_html,lastRating:null,mcqOptions:null,createdAt:r.created_at}))]}));
    setModal({type:"pdfDone", count:rows.length});
  };

  const shareSet = sid => setModal({type:"share", setId:sid});

  const SHARED_FOLDER_ID = "__shared__";
  const sharedSets = data.sets.filter(s => s.isSharedWithMe);
  const ownedSets = data.sets.filter(s => !s.isSharedWithMe);
  const set = data.sets.find(s=>s.id===sel.setId);
  const setCCards = data.cards.filter(c=>c.setId===sel.setId);
  const isViewingShared = sel.folderId === SHARED_FOLDER_ID;
  const folder = isViewingShared
    ? { id: SHARED_FOLDER_ID, name: "Geteilt mit mir", color: "#8B5CF6", isVirtualShared: true }
    : data.folders.find(f=>f.id===sel.folderId);
  const folderSets = isViewingShared ? sharedSets : ownedSets.filter(s=>s.folderId===sel.folderId);
  const rootFolders = data.folders.filter(f=>!f.parentId).map(f=>{
    const fs=ownedSets.filter(s=>s.folderId===f.id); const fc=data.cards.filter(c=>fs.some(s=>s.id===c.setId));
    return {...f, setCount:fs.length, cardCount:fc.length, progress:calcProgress(fc)};
  });
  if (sharedSets.length > 0) {
    const sc = data.cards.filter(c => sharedSets.some(s => s.id === c.setId));
    rootFolders.push({id:SHARED_FOLDER_ID, name:"Geteilt mit mir", color:"#8B5CF6", parentId:null, isVirtualShared:true, setCount:sharedSets.length, cardCount:sc.length, progress:calcProgress(sc)});
  }

  if (studyMode) {
    const sc=data.cards.filter(c=>c.setId===studyMode.setId).slice(0,studyMode.count);
    const ss=data.sets.find(s=>s.id===studyMode.setId); const Exit=()=>setStudyMode(null);
    if (studyMode.mode==="flash") return <FlashMode set={ss} cards={sc} onExit={Exit} onRate={updateCardRating}/>;
    return <MCQMode set={ss} cards={sc} onExit={Exit} onRate={updateCardRating} onCacheMCQ={cacheCardMCQ}/>;
  }

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {mobile&&menuOpen&&<div className="mob-overlay" onClick={()=>setMenuOpen(false)}></div>}
      <aside className={"hb-aside"+(mobile&&menuOpen?" open":"")} style={{width:"var(--sw)",minWidth:"var(--sw)",height:"100vh",background:"linear-gradient(180deg,#FFF,#FDFCFA)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"20px 18px 16px",borderBottom:"1px solid var(--border)",background:"linear-gradient(160deg,#FFF5EE,#FFFAF7 60%,#FFF)"}}>
          <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:22,background:"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-.3px"}}>Heribert ✦</div>
          <div style={{fontSize:13,color:"var(--muted)",marginTop:4}}>Hallo, <b style={{color:"var(--text)"}}>{userName.split(" ")[0]}</b> 👋</div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"10px 8px"}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--muted2)",padding:"8px 10px 6px",letterSpacing:".08em",textTransform:"uppercase"}}>Lernbereiche</div>
          {loading ? <div style={{padding:"12px 10px",color:"var(--muted2)",fontSize:13,display:"flex",alignItems:"center",gap:8}}><ISpin c="var(--muted2)" s={16}/> Lädt…</div>
            : rootFolders.length===0 ? <div style={{padding:"8px 10px",fontSize:13,color:"var(--muted2)"}}>Noch keine Ordner</div>
            : rootFolders.map(f => <SidebarFolder key={f.id} folder={f} isActive={sel.folderId===f.id} onClick={()=>setSel({folderId:f.id,setId:null})} onDelete={()=>{if(confirm(`"${f.name}" l\u00f6schen?`))removeFolder(f.id);}} onRename={name=>renameFolder(f.id,name)}/>)
          }
          <button className="folder-row" onClick={()=>setModal({type:"folder"})} style={{border:"1.5px dashed var(--border)",color:"var(--muted)",fontSize:13,marginTop:6}}>
            <IPlus/> Neuer Ordner
          </button>
        </div>
        <div style={{borderTop:"1px solid var(--border)",padding:"10px 8px",background:"linear-gradient(0deg,#FFF8F4,#FFF)"}}>
          <button className="folder-row" onClick={()=>setProfileOpen(true)} style={{width:"100%",justifyContent:"flex-start"}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:"var(--grad)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0}}>{userName.charAt(0).toUpperCase()}</div>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{userName}</div>
              <div style={{fontSize:11,color:"var(--muted2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.email}</div>
            </div>
            <button className="btn-danger" onClick={e=>{e.stopPropagation();onLogout();}} style={{padding:"4px 6px"}}><ILogout/></button>
          </button>
        </div>
      </aside>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div className="mob-topbar"><button onClick={()=>setMenuOpen(true)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text)",padding:4,display:"flex"}}><IMenu/></button><div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:18,background:"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",flex:1}}>Heribert ✦</div><div onClick={()=>setProfileOpen(true)} style={{width:30,height:30,borderRadius:"50%",background:"var(--grad)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>{userName.charAt(0).toUpperCase()}</div></div>
        <main className="hb-main" style={{flex:1,overflowY:"auto",padding:"40px 48px",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4 40%,#F5F4F1)"}}>
        {loading ? <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",gap:12,color:"var(--muted)"}}><ISpin/><span style={{fontSize:15}}>Daten werden geladen…</span></div> : <>
          {!sel.folderId && <HomeView userName={userName} data={data} onSelectFolder={fid=>setSel({folderId:fid,setId:null})}/>}
          {sel.folderId && !sel.setId && (
            <FolderView folder={folder} sets={folderSets} data={data}
              onBack={()=>setSel({folderId:null,setId:null})} onNewSet={()=>setModal({type:"set"})}
              onSelectSet={sid=>setSel(p=>({...p,setId:sid}))} onLearn={sc=>setStudyConfig(sc)}
              onDeleteSet={sid=>{if(confirm("Set l\u00f6schen?"))removeSet(sid);}} onRenameSet={renameSet}
              onShare={shareSet}/>
          )}
          {sel.setId && (
            <SetView set={set} folder={folder} cards={setCCards}
              onBack={()=>setSel(p=>({...p,setId:null}))} onNewCard={()=>setModal({type:"card"})}
              onEditCard={c=>{setEditCard(c);setModal({type:"card"});}} onDeleteCard={removeCard}
              onLearn={()=>setStudyConfig({setId:sel.setId,cards:setCCards})}
              onShare={()=>shareSet(sel.setId)} onImportPDF={importPDF}
              onExport={()=>setModal({type:"export"})}/>
          )}
        </>}
      </main>
      </div>

      {studyConfig && <StudyConfigModal config={studyConfig} onStart={cfg=>{setStudyConfig(null);setStudyMode(cfg);}} onClose={()=>setStudyConfig(null)}/>}
      {profileOpen && <ProfileModal user={user} userName={userName} onLogout={onLogout} onClose={()=>setProfileOpen(false)}/>}
      {modal?.type==="folder" && <FolderModal onSave={createFolder} onClose={()=>setModal(null)}/>}
      {modal?.type==="set" && <SetModal onSave={createSet} onClose={()=>setModal(null)}/>}
      {modal?.type==="card" && <CardModal card={editCard} saving={saving} onSave={c=>{saveCard(c);setEditCard(null);}} onClose={()=>{setModal(null);setEditCard(null);}}/>}
      {modal?.type==="share" && <ShareModal
        set={data.sets.find(x=>x.id===modal.setId)}
        ownerEmail={user.email}
        onClose={()=>{setModal(null);loadAll();}}/>}
      {modal?.type==="pdfLoading" && <SimpleModal title="📄 PDF verarbeiten" onClose={undefined}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"8px 0 4px"}}>
          <ISpin s={32}/>
          <div style={{fontSize:14,color:"var(--text)",textAlign:"center",fontWeight:500}}>{modal.info}</div>
          <div style={{fontSize:12,color:"var(--muted2)",textAlign:"center",lineHeight:1.5}}>{modal.stage==="extract" ? "Text wird aus dem PDF extrahiert…" : "Kann bei großen PDFs 10-30 Sekunden dauern."}</div>
        </div>
      </SimpleModal>}
      {modal?.type==="pdfPreview" && <PDFPreviewModal cards={modal.cards} sourceName={modal.sourceName} pages={modal.pages} onConfirm={confirmPDFImport} onClose={()=>setModal(null)}/>}
      {modal?.type==="pdfDone" && <SimpleModal title="📄 Import fertig" onClose={()=>setModal(null)}>
        <p style={{color:"var(--muted)",fontSize:14,marginBottom:20}}>{modal.count} Karten zu deinem Set hinzugefügt. Du kannst jetzt lernen oder einzelne Karten bearbeiten.</p>
        <button className="btn-o" onClick={()=>setModal(null)} style={{justifyContent:"center"}}>Super!</button>
      </SimpleModal>}
      {modal?.type==="pdfError" && <SimpleModal title="⚠️ PDF-Fehler" onClose={()=>setModal(null)}>
        <p style={{color:"var(--muted)",fontSize:14,marginBottom:20,whiteSpace:"pre-wrap"}}>{modal.msg}</p>
        <button className="btn-g" onClick={()=>setModal(null)}>Schließen</button>
      </SimpleModal>}
      {modal?.type==="export" && set && <ExportModal set={set} cards={setCCards} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// \u2500\u2500\u2500 FOLDER VIEW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function FolderView({folder,sets,data,onBack,onNewSet,onSelectSet,onLearn,onDeleteSet,onRenameSet,onShare}) {
  const isShared = folder?.isVirtualShared;
  return (
    <div className="au">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:32,flexWrap:"wrap",gap:16}}>
        <div>
          <button style={{display:"flex",alignItems:"center",gap:6,border:"none",background:"none",color:"var(--muted)",fontSize:14,cursor:"pointer",fontFamily:"inherit",marginBottom:12,padding:"4px 0"}} onClick={onBack}><IBack/> Übersicht</button>
          <h1 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:28,display:"flex",alignItems:"center",gap:10}}>{isShared && <span>👥</span>}{folder?.name}</h1>
          <div style={{color:"var(--muted)",fontSize:14,marginTop:4}}>{sets.length} Sets · {data.cards.filter(c=>sets.some(s=>s.id===c.setId)).length} Karten · <span style={{color:"var(--orange)",fontWeight:600}}>{calcProgress(data.cards.filter(c=>sets.some(s=>s.id===c.setId)))}% gelernt</span></div>
          {isShared && <div style={{marginTop:8,fontSize:12,color:"var(--muted2)",background:"#F5F3FF",border:"1px solid #C4B5FD",borderRadius:8,padding:"6px 10px",display:"inline-block"}}>Sets, die andere mit dir geteilt haben · nur lesen & lernen</div>}
        </div>
        {!isShared && <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn-o" onClick={onNewSet}><IPlus/> Neues Set</button>
        </div>}
      </div>
      {sets.length===0
        ? <EmptyState icon={isShared?"👥":"📚"} title={isShared?"Noch nichts geteilt":"Noch keine Sets"} sub={isShared?"Wenn dich jemand zu einem Set einlädt, erscheint es hier.":"Erstelle dein erstes Set, um loszulegen."} btnLabel={isShared?null:"+ Erstes Set erstellen"} onBtn={isShared?null:onNewSet}/>
        : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:16}}>
            {sets.map(s => { const sc=data.cards.filter(c=>c.setId===s.id); return <SetCard key={s.id} set={s} cardCount={sc.length} progress={calcProgress(sc)} onClick={()=>onSelectSet(s.id)} onLearn={()=>onLearn({setId:s.id,cards:sc})} onDelete={()=>onDeleteSet(s.id)} onRename={name=>onRenameSet(s.id,name)} onShare={()=>onShare(s.id)}/>; })}
          </div>
      }
    </div>
  );
}

// \u2500\u2500\u2500 SET VIEW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function SetView({set,folder,cards,onBack,onNewCard,onEditCard,onDeleteCard,onLearn,onShare,onImportPDF,onExport}) {
  const prog = calcProgress(cards);
  const readOnly = set?.isSharedWithMe;
  return (
    <div className="au">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:28,flexWrap:"wrap",gap:14}}>
        <div>
          <button style={{display:"flex",alignItems:"center",gap:6,border:"none",background:"none",color:"var(--muted)",fontSize:14,cursor:"pointer",fontFamily:"inherit",marginBottom:10,padding:"4px 0"}} onClick={onBack}><IBack/> {folder?.name}</button>
          <h1 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:26,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>{set?.name}{readOnly && <span style={{fontSize:11,fontWeight:600,background:"#F5F3FF",color:"#7C3AED",padding:"3px 10px",borderRadius:99,border:"1px solid #C4B5FD"}}>Geteilt · nur lesen</span>}</h1>
          {set?.description && <p style={{color:"var(--muted)",fontSize:14,marginTop:4}}>{set.description}</p>}
          <div style={{display:"flex",gap:16,marginTop:8,alignItems:"center"}}>
            <span style={{color:"var(--muted)",fontSize:13}}>{cards.length} Karten</span>
            {cards.length>0 && <><div style={{flex:1,maxWidth:120}}><div className="prog-track"><div className={`prog-fill${prog>=80?" done":""}`} style={{width:`${prog}%`}}/></div></div><span style={{color:"var(--orange)",fontSize:13,fontWeight:600}}>{prog}%</span></>}
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {!readOnly && <label className="btn-sm" style={{cursor:"pointer"}}><IPdf/> PDF <input type="file" accept=".pdf" style={{display:"none"}} onChange={e=>e.target.files[0]&&onImportPDF(e.target.files[0])}/></label>}
          {cards.length>0 && <button className="btn-sm" onClick={onExport}><IDownload/> Export</button>}
          {!readOnly && <button className="btn-sm" onClick={onShare}><IShare/> Teilen</button>}
          {cards.length>0 && <button className="btn-o" onClick={onLearn}><IBook/> Lernen</button>}
          {!readOnly && <button className="btn-g" onClick={onNewCard}><IPlus/> Karte</button>}
        </div>
      </div>
      {cards.length===0
        ? <EmptyState icon="🎴" title="Noch keine Karteikarten" sub={readOnly?"Dieses geteilte Set enthält noch keine Karten.":"Erstelle deine erste Karte oder importiere eine PDF."} btnLabel={readOnly?null:"+ Erste Karte erstellen"} onBtn={readOnly?null:onNewCard}/>
        : <div style={{display:"flex",flexDirection:"column",gap:10}}>{cards.map(c=><CardRow key={c.id} card={c} readOnly={readOnly} onEdit={readOnly?null:(()=>onEditCard(c))} onDelete={readOnly?null:(()=>onDeleteCard(c.id))}/>)}</div>
      }
    </div>
  );
}

// \u2500\u2500\u2500 SUB-COMPONENTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function SidebarFolder({folder,isActive,onClick,onDelete,onRename}) {
  const [editing,setEditing]=useState(false); const [name,setName]=useState(folder.name); const ref=useRef();
  const commit=()=>{setEditing(false);if(name.trim()&&name.trim()!==folder.name)onRename(name.trim());};
  useEffect(()=>{if(editing)ref.current?.focus();},[editing]);
  const virtualShared = folder.isVirtualShared;
  return (<div className={`folder-row${isActive?" active":""}`} onClick={onClick}>
    {virtualShared ? <span style={{fontSize:15,lineHeight:1}}>👥</span> : <IFolder c={folder.color} s={15}/>}
    <div style={{flex:1,overflow:"hidden"}}>
      {editing && !virtualShared ? <input className="inline-edit" ref={ref} value={name} onChange={e=>setName(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}} onClick={e=>e.stopPropagation()} style={{fontSize:13,fontWeight:500,width:"100%"}}/>
        : <div style={{fontSize:13,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} onDoubleClick={virtualShared?undefined:(e=>{e.stopPropagation();setEditing(true);})}>{folder.name}</div>}
      <div style={{fontSize:11,color:"var(--muted2)",marginTop:1}}>{folder.setCount} Sets · {folder.cardCount} Karten{folder.cardCount>0&&<span style={{marginLeft:4,color:folder.progress>=80?"var(--green)":"var(--orange)"}}>· {folder.progress}%</span>}</div>
    </div>
    {!virtualShared && <button className="icon-btn" onClick={e=>{e.stopPropagation();onDelete();}}><ITrash/></button>}
  </div>);
}

function SetCard({set,cardCount,progress,onClick,onLearn,onDelete,onRename,onShare}){
  const [editing,setEditing]=useState(false); const [name,setName]=useState(set.name); const ref=useRef();
  const commit=()=>{setEditing(false);if(name.trim()&&name.trim()!==set.name)onRename(name.trim());};
  useEffect(()=>{if(editing)ref.current?.focus();},[editing]);
  const readOnly = set.isSharedWithMe;
  return (<div className="card-hover" style={{background:readOnly?"linear-gradient(180deg,#FAF5FF,#F5F3FF)":"linear-gradient(180deg,#FFF,#F8F5F0)",border:readOnly?"1.5px solid #C4B5FD":"1.5px solid var(--border)",borderRadius:16,padding:"18px 18px 14px",cursor:"pointer",boxShadow:"0 2px 6px rgba(0,0,0,.05)"}} onClick={editing?undefined:onClick}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
      <div style={{flex:1,marginRight:10,paddingTop:2}}>
        {editing && !readOnly ? <input className="inline-edit" ref={ref} value={name} onChange={e=>setName(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}} onClick={e=>e.stopPropagation()} style={{fontSize:15,fontWeight:600,width:"100%"}}/>
          : <div style={{fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:15,lineHeight:1.4}} onDoubleClick={readOnly?undefined:(e=>{e.stopPropagation();setEditing(true);})}>{set.name}</div>}
        <div style={{fontSize:12,color:"var(--muted)",marginTop:5}}>{cardCount} Karten{readOnly && <span style={{marginLeft:6,color:"#7C3AED",fontWeight:600}}>· geteilt</span>}</div>
      </div>
      <ProgressCircle pct={progress} size={50} stroke={5}/>
    </div>
    <div style={{display:"flex",gap:6,alignItems:"center"}} onClick={e=>e.stopPropagation()}>
      <button className="btn-sm" style={{flex:1,justifyContent:"center",minHeight:34}} onClick={onLearn} disabled={cardCount===0}>Lernen</button>
      {!readOnly && <>
        <button className="icon-btn edit" onClick={e=>{e.stopPropagation();setEditing(true);}}><IEdit/></button>
        <button className="icon-btn" onClick={e=>{e.stopPropagation();onDelete();}}><ITrash/></button>
        <button className="btn-sm" style={{minHeight:34}} onClick={onShare}><IShare/></button>
      </>}
    </div>
  </div>);
}

function CardRow({card,onEdit,onDelete,readOnly}) {
  const [open,setOpen]=useState(false); const ri=card.lastRating!=null?RATINGS[card.lastRating]:null;
  return (<div style={{background:"linear-gradient(160deg,#FFF,#FDFCFA)",border:"1.5px solid var(--border)",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.03)"}}>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",cursor:"pointer"}} onClick={()=>setOpen(p=>!p)}>
      <div style={{flex:1,overflow:"hidden",fontSize:14,fontWeight:500,whiteSpace:"nowrap",textOverflow:"ellipsis"}} dangerouslySetInnerHTML={{__html:card.questionHtml||"<em style='color:var(--muted2)'>Keine Frage</em>"}}/>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        {ri && <span style={{fontSize:16}}>{ri.emoji}</span>}
        {!readOnly && <button className="icon-btn edit" onClick={e=>{e.stopPropagation();onEdit();}}><IEdit/></button>}
        {!readOnly && <button className="icon-btn" onClick={e=>{e.stopPropagation();onDelete();}}><ITrash/></button>}
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" strokeWidth="2.5" style={{transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .2s"}}><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>
    {open && <div style={{borderTop:"1px solid var(--border)",padding:"14px 16px",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)"}}>
      <div style={{fontSize:12,fontWeight:600,color:"var(--orange)",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>Antwort</div>
      <div style={{fontSize:14,lineHeight:1.7}} dangerouslySetInnerHTML={{__html:card.answerHtml||"<em style='color:var(--muted2)'>Keine Antwort</em>"}}/>
    </div>}
  </div>);
}

function HomeView({userName,data,onSelectFolder}){
  const overallProg=calcProgress(data.cards); const superCards=data.cards.filter(c=>c.lastRating===3).length;
  const rootFolders=data.folders.filter(f=>!f.parentId);
  return (<div className="au">
    <div style={{marginBottom:28}}>
      <h1 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:30,marginBottom:4}}>Übersicht</h1>
      <p style={{color:"var(--muted)",fontSize:15}}>Guten Tag, {userName.split(" ")[0]} — weiter geht's 🎯</p>
    </div>
    <div className="hb-g-stats" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:12,marginBottom:32}}>
      {[{label:"Lernbereiche",val:data.folders.length,icon:"📁",c:"#F5631A"},{label:"Sets",val:data.sets.length,icon:"📚",c:"#3B82F6"},{label:"Karten",val:data.cards.length,icon:"🃏",c:"#8B5CF6"},{label:"Gemeistert",val:superCards,icon:"😎",c:"#F59E0B"}].map(s=>(
        <div key={s.label} className="hb-stat" style={{background:"linear-gradient(180deg,#FFF,#F8F5F0)",border:"1.5px solid var(--border)",borderRadius:13,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
          <div className="hb-stat-icon" style={{fontSize:24,marginBottom:5}}>{s.icon}</div>
          <div className="hb-stat-val" style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:22,color:s.c}}>{s.val}</div>
          <div className="hb-stat-label" style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{s.label}</div>
        </div>
      ))}
      <div className="hb-prog-span" style={{background:"linear-gradient(180deg,#FFF3EC,#FFE8D8)",border:"1.5px solid var(--ob)",borderRadius:13,padding:"14px 16px",boxShadow:"0 1px 4px rgba(245,99,26,.07)",display:"flex",alignItems:"center",gap:12}}>
        <ProgressCircle pct={overallProg} size={52} stroke={6}/>
        <div><div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:14,color:"var(--orange)"}}>Gesamt</div><div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{data.cards.length} Karten</div></div>
      </div>
    </div>
    {rootFolders.length>0 && <>
      <h2 style={{fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:18,marginBottom:14}}>Lernbereiche</h2>
      <div className="hb-g-folders" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
        {rootFolders.map(f=>{const fs=data.sets.filter(s=>s.folderId===f.id);const fc=data.cards.filter(c=>fs.some(s=>s.id===c.setId));const prog=calcProgress(fc);return(
          <div key={f.id} className="card-hover" style={{background:"linear-gradient(180deg,#FFF,#F8F5F0)",border:"1.5px solid var(--border)",borderRadius:13,padding:"16px",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}} onClick={()=>onSelectFolder(f.id)}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
              <div style={{flex:1,marginRight:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}><IFolder c={f.color} s={16}/><div style={{fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:14}}>{f.name}</div></div>
                <div style={{fontSize:11,color:"var(--muted)"}}>{fs.length} Sets · {fc.length} Karten</div>
              </div>
              <ProgressCircle pct={prog} size={44} stroke={4}/>
            </div>
          </div>
        );})}
      </div>
    </>}
    {data.folders.length===0 && <EmptyState icon="✦" title="Willkommen bei Heribert" sub="Erstelle deinen ersten Lernbereich oder importiere aus Vaia." btnLabel={null} onBtn={null}/>}
  </div>);
}

function StudyConfigModal({config,onStart,onClose}) {
  const [mode,setMode]=useState("flash"); const total=config.cards.length; const [count,setCount]=useState(total);
  return (<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:480,padding:32}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:22,marginBottom:6}}>Lernen einrichten</h3>
    <p style={{color:"var(--muted)",fontSize:14,marginBottom:24}}>{total} Karten verf\u00fcgbar</p>
    <div style={{fontSize:13,fontWeight:600,color:"var(--muted)",marginBottom:10,textTransform:"uppercase",letterSpacing:".06em"}}>Modus</div>

function FlashMode({set,cards,onExit,onRate,readOnly}) {

function MCQMode({set,cards,onExit,onRate,onCacheMCQ,readOnly}) {
  const [idx,setIdx]=useState(0); const [optsMap,setOptsMap]=useState({}); const [loadingMCQ,setLoadingMCQ]=useState(true);
  const [picked,setPicked]=useState(null); const [score,setScore]=useState(0); const [done,setDone]=useState(false); const [shuffledOpts,setShuffledOpts]=useState(null);
  const card=cards[idx];
  useEffect(()=>{(async()=>{setLoadingMCQ(true);const map={};for(const c of cards){if(c.mcqOptions){map[c.id]=c.mcqOptions;}else{const w=await genMCQ(c.questionHtml,c.answerHtml);if(w){map[c.id]=w;if(!readOnly&&onCacheMCQ)onCacheMCQ(c.id,w);}else{map[c.id]=["Option A","Option B","Option C"];}}}setOptsMap(map);setLoadingMCQ(false);})();},[]);
  useEffect(()=>{if(optsMap[card?.id]){const correct=strip(card.answerHtml)||"Richtige Antwort";const all=[...optsMap[card.id].map(w=>({text:w,ok:false})),{text:correct,ok:true}];for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}setShuffledOpts(all);setPicked(null);}},[idx,optsMap]);
  const pick=(opt,i)=>{if(picked!==null)return;setPicked(i);if(!readOnly&&onRate)onRate(card.id,opt.ok?2:0);if(opt.ok)setScore(p=>p+1);};
  const next=()=>{if(idx+1>=cards.length){setDone(true);return;}setIdx(p=>p+1);};
  if(loadingMCQ)return(<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",gap:16}}><ISpin/><div style={{color:"var(--muted)",fontSize:14}}>KI generiert Antwortoptionen…</div></div>);
  if(done){const pct=Math.round((score/cards.length)*100);return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",padding:20}}><div className="au" style={{textAlign:"center",maxWidth:440}}><div style={{fontSize:56,marginBottom:16}}>{pct>=80?"\ud83c\udfc6":pct>=50?"\ud83d\udcc8":"\ud83d\udcaa"}</div><h2 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:28,marginBottom:8}}>Ergebnis</h2><div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:52,background:pct>=80?"linear-gradient(135deg,#22C55E,#16A34A)":"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>{pct}%</div><div style={{color:"var(--muted)",marginBottom:32}}>{score} von {cards.length} richtig</div><div style={{display:"flex",gap:10,justifyContent:"center"}}><button className="btn-g" onClick={()=>{setIdx(0);setScore(0);setDone(false);}}>Nochmal</button><button className="btn-o" onClick={onExit}>Zurück</button></div></div></div>);}
  return(<div style={{minHeight:"100vh",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",padding:"40px 20px",display:"flex",flexDirection:"column",alignItems:"center"}}>
    <div style={{width:"100%",maxWidth:640,marginBottom:28}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><button onClick={onExit} style={{display:"flex",alignItems:"center",gap:6,border:"none",background:"none",color:"var(--muted)",fontSize:14,cursor:"pointer",padding:0,fontFamily:"inherit"}}><IBack/> {set?.name}</button><span style={{fontSize:14,fontWeight:600,color:"var(--muted)"}}>{idx+1} / {cards.length} · {score} ✓</span></div><div className="prog-track"><div className="prog-fill" style={{width:`${(idx/cards.length)*100}%`}}/></div></div>
    <div style={{width:"100%",maxWidth:640,background:"linear-gradient(160deg,#FFF,#FDFCFA)",border:"2px solid var(--border)",borderRadius:18,padding:28,marginBottom:16}}><div style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Frage {idx+1}</div><div style={{fontSize:18,lineHeight:1.6}} dangerouslySetInnerHTML={{__html:card?.questionHtml||""}}/></div>
    <div style={{width:"100%",maxWidth:640,display:"flex",flexDirection:"column",gap:10}}>
      {(shuffledOpts||[]).map((opt,i)=>{let bg="linear-gradient(160deg,#FFF,#FDFCFA)",bc="var(--border)",color="var(--text)";if(picked!==null){if(opt.ok){bg="linear-gradient(160deg,#F0FDF4,#DCFCE7)";bc="var(--gm)";color="#15803D";}else if(i===picked&&!opt.ok){bg="linear-gradient(160deg,#FEF2F2,#FEE2E2)";bc="var(--red)";color="#DC2626";}}return(<button key={i} onClick={()=>pick(opt,i)} style={{padding:"15px 20px",border:`2px solid ${bc}`,borderRadius:12,background:bg,color,fontSize:15,textAlign:"left",cursor:picked!==null?"default":"pointer",transition:"all .15s",fontFamily:"inherit",display:"flex",alignItems:"center",gap:10}} onMouseEnter={e=>{if(picked===null){e.currentTarget.style.borderColor="var(--orange)";e.currentTarget.style.background="linear-gradient(160deg,#FFF3EC,#FFE8D8)";}}} onMouseLeave={e=>{if(picked===null){e.currentTarget.style.borderColor=bc;e.currentTarget.style.background=bg;}}}>
        <span style={{width:24,height:24,borderRadius:6,background:picked!==null&&opt.ok?"#22C55E":picked===i&&!opt.ok?"#DC2626":"var(--border)",color:picked!==null&&(opt.ok||i===picked)?"#fff":"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,transition:"all .15s"}}>{String.fromCharCode(65+i)}</span>
        {opt.text}
      </button>);})}
    </div>
    {picked!==null&&<div className="au" style={{marginTop:20}}><button className="btn-o" onClick={next}>{idx+1>=cards.length?"Ergebnisse \u2192":"N\u00e4chste Frage \u2192"}</button></div>}
  </div>);

function ShareModal({set,ownerEmail,onClose}) {
  const [shares,setShares]=useState([]);
  const [email,setEmail]=useState("");
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");
  const [loading,setLoading]=useState(true);
  const [busy,setBusy]=useState(false);

  const load = async () => {
    setLoading(true);
    const {data, error} = await sb.from("set_shares").select("*").eq("set_id", set.id).order("created_at",{ascending:false});
    if (!error) setShares(data||[]);
    setLoading(false);
  };
  useEffect(()=>{ if(set) load(); }, [set?.id]);

  const addShare = async () => {
    setErr(""); setOk("");
    const e = email.trim().toLowerCase();
    if (!e || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) { setErr("Bitte gültige E-Mail-Adresse eingeben."); return; }
    if (e === (ownerEmail||"").toLowerCase()) { setErr("Du kannst dich nicht selbst einladen."); return; }
    if (shares.some(s => (s.invited_email||"").toLowerCase() === e)) { setErr("Diese E-Mail wurde bereits eingeladen."); return; }
    setBusy(true);
    const {error} = await sb.from("set_shares").insert({set_id:set.id, invited_email:e, owner_email:ownerEmail});
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setEmail(""); setOk(`✓ ${e} hat jetzt Zugriff.`);
    load();
  };

  const removeShare = async (id) => {
    if (!confirm("Zugriff für diese Person entfernen?")) return;
    await sb.from("set_shares").delete().eq("id", id);
    load();
  };

  if (!set) return null;
  return (<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:480,padding:0}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"22px 26px 14px",borderBottom:"1px solid var(--border)",background:"linear-gradient(160deg,#FFF8F4,#FFF)"}}>
      <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:19,marginBottom:2}}>Set teilen</h3>
      <div style={{fontSize:13,color:"var(--muted)"}}>„{set.name}" — nur eingeladene Personen haben Zugriff</div>
    </div>
    <div style={{padding:"18px 26px 22px"}}>
      <label style={{display:"block",fontSize:13,fontWeight:500,color:"var(--muted)",marginBottom:6}}>Person per E-Mail einladen</label>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input type="email" placeholder="name@beispiel.de" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addShare()}
          style={{flex:1,padding:"10px 14px",border:"1.5px solid var(--border)",borderRadius:9,fontSize:14,background:"white",outline:"none",fontFamily:"inherit"}}
          onFocus={e=>e.target.style.borderColor="var(--orange)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
        <button className="btn-o" onClick={addShare} disabled={busy||!email.trim()}>{busy?<ISpin c="#fff" s={16}/>:"Einladen"}</button>
      </div>
      {err && <div style={{color:"var(--red)",fontSize:13,marginBottom:10,padding:"8px 12px",background:"var(--rl)",borderRadius:7}}>{err}</div>}
      {ok && <div style={{color:"var(--green)",fontSize:13,marginBottom:10,padding:"8px 12px",background:"var(--gl)",borderRadius:7}}>{ok}</div>}

      <div style={{fontSize:12,fontWeight:600,color:"var(--muted2)",textTransform:"uppercase",letterSpacing:".06em",marginTop:18,marginBottom:8}}>Zugriff haben</div>
      {loading ? <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",color:"var(--muted2)",fontSize:13}}><ISpin c="var(--muted2)" s={14}/> Lädt…</div>
        : <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"linear-gradient(160deg,#FFF8F4,#FFF3EC)",border:"1px solid var(--ob)",borderRadius:9}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"var(--grad)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0}}>{(ownerEmail||"?").charAt(0).toUpperCase()}</div>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ownerEmail}</div>
              <div style={{fontSize:11,color:"var(--orange)",fontWeight:600}}>Besitzer · Du</div>
            </div>
          </div>
          {shares.length===0 ? <div style={{fontSize:13,color:"var(--muted2)",padding:"8px 2px"}}>Noch niemand eingeladen.</div>
            : shares.map(s => (
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"linear-gradient(160deg,#FFF,#FDFCFA)",border:"1px solid var(--border)",borderRadius:9}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#8B5CF6,#A78BFA)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0}}>{(s.invited_email||"?").charAt(0).toUpperCase()}</div>
                <div style={{flex:1,overflow:"hidden"}}>
                  <div style={{fontSize:13,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.invited_email}</div>
                  <div style={{fontSize:11,color:"var(--muted2)"}}>Eingeladen {new Date(s.created_at).toLocaleDateString("de-DE")}</div>
                </div>
                <button onClick={()=>removeShare(s.id)} className="icon-btn" title="Zugriff entfernen"><ITrash/></button>
              </div>
            ))}
        </div>}

      <div style={{fontSize:11,color:"var(--muted2)",lineHeight:1.6,marginTop:16,padding:"10px 12px",background:"#F8F6F3",borderRadius:8}}>
        💡 Eingeladene Personen müssen sich mit derselben E-Mail-Adresse in Heribert registrieren/anmelden. Das Set erscheint dann bei ihnen unter „Geteilt mit mir". Nur lesen & lernen, kein Bearbeiten.
      </div>
    </div>
  </div></div>);
}

function PDFPreviewModal({cards,sourceName,pages,onConfirm,onClose}){
  // Selection state: track which cards user has excluded
  const [excluded,setExcluded]=useState(()=>new Set());
  const toggle = i => setExcluded(p => { const n=new Set(p); n.has(i)?n.delete(i):n.add(i); return n; });
  const included = cards.filter((_,i)=>!excluded.has(i));
  const allSelected = excluded.size === 0;
  const noneSelected = excluded.size === cards.length;

  return(<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:640,padding:0,display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"20px 24px 14px",borderBottom:"1px solid var(--border)",background:"linear-gradient(160deg,#FFF8F4,#FFF)"}}>
      <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:19,marginBottom:4}}>📄 {cards.length} Karten generiert</h3>
      <div style={{fontSize:13,color:"var(--muted)"}}>Aus „{sourceName}" ({pages} Seite{pages===1?"":"n"}) · wähle ab, was du nicht willst</div>
    </div>
    <div style={{padding:"10px 24px 4px",borderBottom:"1px solid var(--border)",background:"linear-gradient(160deg,#FFFDF9,#FFF)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      <div style={{fontSize:13,color:"var(--text)"}}><b>{included.length}</b> von {cards.length} ausgewählt</div>
      <div style={{display:"flex",gap:6}}>
        <button className="btn-sm" onClick={()=>setExcluded(new Set())} disabled={allSelected}>Alle</button>
        <button className="btn-sm" onClick={()=>setExcluded(new Set(cards.map((_,i)=>i)))} disabled={noneSelected}>Keine</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 24px",maxHeight:"50vh"}}>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {cards.map((c,i)=>{
          const on=!excluded.has(i);
          return (<div key={i} onClick={()=>toggle(i)} style={{padding:"11px 13px",background:on?"linear-gradient(160deg,#FFF,#FDFCFA)":"linear-gradient(160deg,#F5F3EF,#EDEAE4)",border:`1.5px solid ${on?"var(--ob)":"var(--border)"}`,borderRadius:10,cursor:"pointer",transition:"all .15s",opacity:on?1:.55}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              <div style={{width:18,height:18,marginTop:2,borderRadius:5,border:`2px solid ${on?"var(--orange)":"var(--muted2)"}`,background:on?"var(--orange)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                {on && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5"><polyline points="20 6 9 17 4 12"/></svg>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:3,lineHeight:1.4}}>{c.q}</div>
                <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5}}>{c.a}</div>
              </div>
            </div>
          </div>);
        })}
      </div>
    </div>
    <div style={{padding:"14px 24px 18px",borderTop:"1px solid var(--border)",display:"flex",gap:10,background:"linear-gradient(0deg,#FFFDF9,#FFF)"}}>
      <button className="btn-g" onClick={onClose}>Abbrechen</button>
      <button className="btn-o" style={{flex:1,justifyContent:"center"}} onClick={()=>onConfirm(included)} disabled={included.length===0}>{included.length===0 ? "Keine Karten ausgewählt" : `${included.length} Karten importieren`}</button>
    </div>
  </div></div>);
}

function ExportModal({set,cards,onClose}) {
  const Tile = ({icon,title,desc,hint,onClick,color}) => (
    <button onClick={onClick} style={{flex:1,minWidth:0,background:"linear-gradient(160deg,#FFF,#FDFCFA)",border:"1.5px solid var(--border)",borderRadius:14,padding:"20px 18px",textAlign:"left",cursor:"pointer",fontFamily:"inherit",transition:"all .15s",display:"flex",flexDirection:"column",gap:8}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 8px 24px ${color}22`;}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
      <div style={{fontSize:28,lineHeight:1}}>{icon}</div>
      <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:15,color:"var(--text)"}}>{title}</div>
      <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5}}>{desc}</div>
      <div style={{fontSize:11,color:color,fontWeight:600,marginTop:"auto"}}>{hint} →</div>
    </button>
  );
  return (<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:520,padding:0}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"20px 24px 14px",borderBottom:"1px solid var(--border)",background:"linear-gradient(160deg,#FFF8F4,#FFF)"}}>
      <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:18,marginBottom:2}}>Set exportieren</h3>
      <div style={{fontSize:13,color:"var(--muted)"}}>{cards.length} Karten aus „{set.name}"</div>
    </div>
    <div style={{padding:"20px 24px 24px",display:"flex",gap:12,flexWrap:"wrap"}}>
      <Tile icon="📄" title="Als PDF" desc="Eine A4-Seite pro Karte. Frage oben, Strich in der Mitte, Antwort unten — mit Bildern." hint="Öffnen + drucken" color="#F5631A"
        onClick={()=>{exportSetPDF(set,cards);onClose();}}/>
      <Tile icon="📊" title="Als CSV" desc="Tabelle mit zwei Spalten: Frage, Antwort. Öffnet sich direkt in Excel oder Google Sheets." hint="Datei herunterladen" color="#16A34A"
        onClick={()=>{exportSetCSV(set,cards);onClose();}}/>
    </div>
  </div></div>);
}

function Inp({label,type="text",placeholder,value,onChange,onEnter}) {
  return(<div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:500,color:"var(--muted)",marginBottom:6}}>{label}</label>
    <input type={type} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onEnter?.()}
      style={{width:"100%",padding:"10px 14px",border:"1.5px solid var(--border)",borderRadius:9,fontSize:14,background:"linear-gradient(160deg,#FFF,#FDFCFA)",color:"var(--text)",outline:"none",fontFamily:"inherit",transition:"border-color .15s"}}
      onFocus={e=>e.target.style.borderColor="var(--orange)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
  </div>);
}

function EmptyState({icon,title,sub,btnLabel,onBtn}) {
  return(<div style={{textAlign:"center",padding:"60px 20px",color:"var(--muted)"}}>
    <div style={{fontSize:48,marginBottom:12}}>{icon}</div>
    <div style={{fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:18,color:"var(--text)",marginBottom:8}}>{title}</div>
    <div style={{fontSize:14,marginBottom:24,maxWidth:320,margin:"0 auto 24px"}}>{sub}</div>
    {onBtn&&btnLabel&&<button className="btn-o" onClick={onBtn}>{btnLabel}</button>}
  </div>);
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

// ─── STUDYSMARTER IMPORT ──────────────────────────────────────────────────────
const CORS_PROXY = "https://corsproxy.io/?";

async function fetchStudySmarter(url) {
  try {
    const res = await fetch(CORS_PROXY + encodeURIComponent(url));
    const html = await res.text();
    const ndMatch = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
    if (ndMatch) {
      const nd = JSON.parse(ndMatch[1]);
      const cards = extractCardsFromJSON(nd);
      if (cards.length) return { ok: true, cards, title: extractTitle(nd) || "Importiertes Set" };
    }
  } catch(e) {}
  return { ok: false };
}

function extractCardsFromJSON(obj, depth=0) {
  if (depth > 12 || !obj || typeof obj !== "object") return [];
  const cards = [];
  if (Array.isArray(obj)) {
    for (const item of obj) cards.push(...extractCardsFromJSON(item, depth+1));
  } else {
    const qKey = Object.keys(obj).find(k => /^(question|frage|front|term|q)$/i.test(k));
    const aKey = Object.keys(obj).find(k => /^(answer|antwort|back|definition|a)$/i.test(k));
    if (qKey && aKey) {
      const q = (String(obj[qKey]||"")).replace(/<[^>]*>/g,"").trim();
      const a = (String(obj[aKey]||"")).replace(/<[^>]*>/g,"").trim();
      if (q && a && q.length > 1) cards.push({q, a});
    }
    for (const v of Object.values(obj)) {
      if (typeof v === "object") cards.push(...extractCardsFromJSON(v, depth+1));
    }
  }
  return cards;
}

function extractTitle(obj, depth=0) {
  if (depth > 8 || !obj || typeof obj !== "object") return null;
  if (Array.isArray(obj)) {
    for (const v of obj) { const t = extractTitle(v, depth+1); if (t) return t; }
  } else {
    const titleKey = Object.keys(obj).find(k => /^(title|name|setName|studySetName)$/i.test(k));
    if (titleKey && typeof obj[titleKey] === "string" && obj[titleKey].length > 2) return obj[titleKey];
    for (const v of Object.values(obj)) { const t = extractTitle(v, depth+1); if (t) return t; }
  }
  return null;
}

function parseTextCards(text) {
  const lines = text.replace(/\r\n/g,"\n").trim().split("\n");
  const cards = [];
  if (/^(Q|Frage|Question)[\s:]/im.test(text)) {
    let q = "", a = "";
    for (const line of lines) {
      if (/^(Q|Frage|Question)[\s:]*/i.test(line)) { if(q&&a) cards.push({q:q.trim(),a:a.trim()}); q=line.replace(/^(Q|Frage|Question)[\s:]*/i,""); a=""; }
      else if (/^(A|Antwort|Answer)[\s:]*/i.test(line)) a += " "+line.replace(/^(A|Antwort|Answer)[\s:]*/i,"");
      else if (a) a += " "+line; else q += " "+line;
    }
    if(q&&a) cards.push({q:q.trim(),a:a.trim()});
    if(cards.length) return cards;
  }
  if (text.includes("\t")) {
    for (const line of lines) {
      const parts = line.split("\t");
      if (parts.length >= 2) cards.push({q:parts[0].trim(), a:parts.slice(1).join(" ").trim()});
    }
    if(cards.length) return cards;
  }
  const blocks = text.split(/\n{2,}/);
  for (const block of blocks) {
    const blines = block.trim().split("\n").filter(l=>l.trim());
    if (blines.length >= 2) cards.push({q:blines[0].trim(), a:blines.slice(1).join(" ").trim()});
  }
  return cards;
}

async function genMCQ(q,a){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:300,
        messages:[{role:"user",content:`Q:"${strip(q).slice(0,150)}"\nA:"${strip(a).slice(0,150)}"\nGive exactly 3 wrong but plausible answer options in the same language. Reply ONLY as JSON array: ["w1","w2","w3"]`}]})});
    const d=await r.json();
    const txt=d.content?.find(c=>c.type==="text")?.text||"";
    const parsed=JSON.parse(txt.replace(/```[\w]*/g,"").replace(/```/g,"").trim());
    if(Array.isArray(parsed)&&parsed.length>=3) return parsed.slice(0,3);
  }catch{}
  return null;
}

function AuthScreen(){
  const [tab,setTab]=useState("login");
  const [f,setF]=useState({name:"",email:"",pw:""});
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [confirming,setConfirming]=useState(false); // show "check your email" screen
  const up=k=>v=>setF(p=>({...p,[k]:v}));

  const submit=async()=>{
    setErr("");setBusy(true);
    try{
      if(tab==="login"){
        const {error}=await sb.auth.signInWithPassword({email:f.email,password:f.pw});
        if(error) setErr(error.message==="Invalid login credentials"?"E-Mail oder Passwort falsch.":error.message);
      }else{
        if(!f.name.trim()){setErr("Bitte Namen eingeben.");return;}
        if(!f.email.includes("@")){setErr("Ungültige E-Mail.");return;}
        if(f.pw.length<6){setErr("Passwort mind. 6 Zeichen.");return;}
        const {error}=await sb.auth.signUp({email:f.email,password:f.pw,options:{data:{display_name:f.name.trim()}}});
        if(error) setErr(error.message);
        else setConfirming(true); // show confirmation screen
      }
    }finally{setBusy(false);}
  };

  // ── Bestätigungs-Screen ──────────────────────────────────────────────────
  if(confirming) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)"}}>
      <div className="au" style={{background:"linear-gradient(180deg,#FFF,#FEFCFA)",borderRadius:24,padding:"48px 40px",width:"100%",maxWidth:440,boxShadow:"0 8px 48px rgba(245,99,26,.1),0 0 0 1px rgba(245,99,26,.06)",textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:20}}>📬</div>
        <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:24,marginBottom:12}}>E-Mail bestätigen</div>
        <div style={{color:"var(--muted)",fontSize:15,lineHeight:1.7,marginBottom:8}}>
          Wir haben eine Bestätigungs-E-Mail an
        </div>
        <div style={{fontWeight:600,fontSize:15,color:"var(--orange)",marginBottom:20,padding:"8px 16px",background:"var(--ol)",borderRadius:8,display:"inline-block"}}>{f.email}</div>
        <div style={{color:"var(--muted)",fontSize:14,lineHeight:1.7,marginBottom:32}}>
          Bitte klicke auf den Link in der E-Mail, um deinen Account zu aktivieren. Danach kannst du dich hier anmelden.
        </div>
        <div style={{background:"linear-gradient(160deg,#F8F6F3,#EDEAE4)",borderRadius:12,padding:"14px 16px",fontSize:13,color:"var(--muted)",marginBottom:28,textAlign:"left",lineHeight:1.6}}>
          <b>Kein Mail erhalten?</b><br/>
          Schau im Spam-Ordner nach. Der Absender ist <i>noreply@mail.app.supabase.io</i> — Betreff enthält "Heribert".
        </div>
        <button className="btn-g" onClick={()=>{setConfirming(false);setTab("login");}} style={{width:"100%",justifyContent:"center"}}>
          Zurück zur Anmeldung
        </button>
      </div>
    </div>
  );

  // ── Login / Register ─────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)"}}>
      <div className="au" style={{background:"linear-gradient(180deg,#FFF,#FEFCFA)",borderRadius:24,padding:"44px 40px",width:"100%",maxWidth:420,boxShadow:"0 8px 48px rgba(245,99,26,.1),0 0 0 1px rgba(245,99,26,.06)"}}>
        <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:28,background:"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>Heribert ✦</div>
        <div style={{color:"var(--muted)",fontSize:14,marginBottom:30}}>Deine persönliche Lernplattform</div>
        <div style={{display:"flex",background:"linear-gradient(160deg,#F5F3EF,#EDEAE4)",borderRadius:10,padding:4,marginBottom:26,gap:4}}>
          {["login","register"].map(t=>(
            <button key={t} onClick={()=>{setTab(t);setErr("");}} style={{flex:1,padding:"9px",border:"none",borderRadius:8,background:tab===t?"linear-gradient(160deg,#FFF,#FEFCFA)":"transparent",color:tab===t?"var(--text)":"var(--muted)",fontWeight:tab===t?600:400,fontSize:14,cursor:"pointer",boxShadow:tab===t?"0 1px 4px rgba(0,0,0,.08)":"none",transition:"all .15s",fontFamily:"inherit"}}>
              {t==="login"?"Anmelden":"Registrieren"}
            </button>
          ))}
        </div>
        {tab==="register"&&<Inp label="Name" placeholder="Dein Name" value={f.name} onChange={up("name")}/>}
        <Inp label="E-Mail" type="email" placeholder="du@beispiel.de" value={f.email} onChange={up("email")}/>
        <Inp label="Passwort" type="password" placeholder="••••••••" value={f.pw} onChange={up("pw")} onEnter={submit}/>
        {err&&<div style={{color:"var(--red)",fontSize:13,marginBottom:14,padding:"10px 14px",background:"var(--rl)",borderRadius:8}}>{err}</div>}
        <button className="btn-o" onClick={submit} disabled={busy} style={{width:"100%",padding:"12px",justifyContent:"center",fontSize:15,fontWeight:600,borderRadius:12,opacity:busy?.7:1}}>
          {busy?<ISpin c="#fff" s={18}/>:(tab==="login"?"Anmelden":"Account erstellen")}
        </button>
      </div>
    </div>
  );
}

// ─── SHARED VIEW ──────────────────────────────────────────────────────────────
function SharedView({set,cards}){
  const [mode,setMode]=useState(null);
  if(mode==="flash") return <FlashMode set={set} cards={cards} onExit={()=>setMode(null)} readOnly/>;
  if(mode==="mcq") return <MCQMode set={set} cards={cards} onExit={()=>setMode(null)} readOnly/>;
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",padding:"60px 20px",display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div className="au" style={{maxWidth:600,width:"100%",textAlign:"center"}}>
        <div style={{display:"inline-block",background:"var(--ol)",color:"var(--orange)",fontSize:12,fontWeight:600,padding:"4px 12px",borderRadius:99,marginBottom:16}}>Geteiltes Set · Nur lesen</div>
        <h1 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:32,marginBottom:8}}>{set.name}</h1>
        <p style={{color:"var(--muted2)",fontSize:14,marginBottom:40}}>{cards.length} Karteikarten</p>
        <div style={{display:"flex",gap:12,justifyContent:"center"}}>
          <button className="btn-o" onClick={()=>setMode("flash")}>Karteikarten lernen</button>
          <button className="btn-g" onClick={()=>setMode("mcq")}>Multiple Choice</button>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({session,onLogout}){
  const user=session.user;
  const userName=user.user_metadata?.display_name||user.email.split("@")[0];
  const [data,setData]=useState({folders:[],sets:[],cards:[]});
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState({folderId:null,setId:null});
  const [studyConfig,setStudyConfig]=useState(null);
  const [studyMode,setStudyMode]=useState(null);
  const [modal,setModal]=useState(null);
  const [editCard,setEditCard]=useState(null);
  const [profileOpen,setProfileOpen]=useState(false);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{loadAll();},[]);
  const loadAll=async()=>{
    setLoading(true);
    const [fr,sr,cr]=await Promise.all([
      sb.from("folders").select("*").order("created_at"),
      sb.from("sets").select("*").order("created_at"),
      sb.from("cards").select("*").order("created_at"),
    ]);
    setData({folders:(fr.data||[]).map(toFolder),sets:(sr.data||[]).map(toSet),cards:(cr.data||[]).map(toCard)});
    setLoading(false);
  };

  const createFolder=async(name,color)=>{
    const id=uid();
    await sb.from("folders").insert({id,user_id:user.id,name,color,parent_id:null});
    setData(d=>({...d,folders:[...d.folders,{id,name,color,parentId:null}]}));
    setModal(null);
  };
  const removeFolder=async(fid)=>{
    await sb.from("folders").delete().eq("id",fid);
    setData(d=>{const sids=d.sets.filter(s=>s.folderId===fid).map(s=>s.id);return{folders:d.folders.filter(f=>f.id!==fid),sets:d.sets.filter(s=>s.folderId!==fid),cards:d.cards.filter(c=>!sids.includes(c.setId))};});
    if(sel.folderId===fid) setSel({folderId:null,setId:null});
  };
  const renameFolder=async(fid,name)=>{
    await sb.from("folders").update({name}).eq("id",fid);
    setData(d=>({...d,folders:d.folders.map(f=>f.id===fid?{...f,name}:f)}));
  };
  const createSet=async(name,desc)=>{
    const id=uid();
    await sb.from("sets").insert({id,user_id:user.id,folder_id:sel.folderId,name,description:desc,created_at:new Date().toISOString()});
    setData(d=>({...d,sets:[...d.sets,{id,folderId:sel.folderId,name,description:desc,createdAt:new Date().toISOString()}]}));
    setModal(null);
  };
  const removeSet=async(sid)=>{
    await sb.from("sets").delete().eq("id",sid);
    setData(d=>({...d,sets:d.sets.filter(s=>s.id!==sid),cards:d.cards.filter(c=>c.setId!==sid)}));
    if(sel.setId===sid) setSel(p=>({...p,setId:null}));
  };
  const renameSet=async(sid,name)=>{
    await sb.from("sets").update({name}).eq("id",sid);
    setData(d=>({...d,sets:d.sets.map(s=>s.id===sid?{...s,name}:s)}));
  };
  const saveCard=async(card)=>{
    const isNew=!card.id;setSaving(true);
    if(isNew){
      const id=uid();const now=new Date().toISOString();
      await sb.from("cards").insert({id,user_id:user.id,set_id:sel.setId,question_html:card.questionHtml,answer_html:card.answerHtml,last_rating:null,mcq_options:null,created_at:now});
      setData(d=>({...d,cards:[...d.cards,{id,setId:sel.setId,questionHtml:card.questionHtml,answerHtml:card.answerHtml,lastRating:null,mcqOptions:null,createdAt:now}]}));
    }else{
      await sb.from("cards").update({question_html:card.questionHtml,answer_html:card.answerHtml,mcq_options:null}).eq("id",card.id);
      setData(d=>({...d,cards:d.cards.map(c=>c.id===card.id?{...c,questionHtml:card.questionHtml,answerHtml:card.answerHtml,mcqOptions:null}:c)}));
    }
    setSaving(false);setEditCard(null);setModal(null);
  };
  const removeCard=async(cid)=>{
    await sb.from("cards").delete().eq("id",cid);
    setData(d=>({...d,cards:d.cards.filter(c=>c.id!==cid)}));
  };
  const updateCardRating=async(cid,rating)=>{
    await sb.from("cards").update({last_rating:rating}).eq("id",cid);
    setData(d=>({...d,cards:d.cards.map(c=>c.id===cid?{...c,lastRating:rating}:c)}));
  };
  const cacheCardMCQ=async(cid,opts)=>{
    await sb.from("cards").update({mcq_options:opts}).eq("id",cid);
    setData(d=>({...d,cards:d.cards.map(c=>c.id===cid?{...c,mcqOptions:opts}:c)}));
  };
  const importPDF=async(file)=>{
    try{
      if(!window.pdfjsLib){
        await new Promise((res,rej)=>{const s=document.createElement("script");s.src=PDFJS;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
        window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
      const buf=await file.arrayBuffer();const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
      const NOISE=/^(die\s+führ|fachhochschule|fh\s*wien|wko|source:|quelle:|http|advanced\s+marketing|www\.|institut\s+für|\d{1,3}\s*$|mailto:|tel\.|fax)/i;
      const isNoise=l=>{const t=l.trim();if(!t||t.length<4) return true;if(NOISE.test(t)) return true;if(/^\d+$/.test(t)) return true;return false;};
      const rows=[];
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);const tc=await page.getTextContent();
        const lines=[];let lastY=null;let cur=[];
        const sorted=[...tc.items].sort((a,b)=>b.transform[5]-a.transform[5]);
        for(const item of sorted){const y=Math.round(item.transform[5]);if(lastY===null||Math.abs(y-lastY)>4){if(cur.length) lines.push(cur.join(" ").trim());cur=[item.str];lastY=y;}else cur.push(item.str);}
        if(cur.length) lines.push(cur.join(" ").trim());
        const clean=lines.filter(l=>!isNoise(l));if(clean.length<2) continue;
        const q=clean[0];const al=clean.slice(1).filter(l=>l.length>3);if(!q||!al.length) continue;
        rows.push({id:uid(),user_id:user.id,set_id:sel.setId,question_html:`<p><strong>${q.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</strong></p>`,answer_html:al.map(l=>`<p>${l.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</p>`).join(""),last_rating:null,mcq_options:null,created_at:new Date().toISOString()});
      }
      if(!rows.length){setModal({type:"pdfError",msg:"Keine auswertbaren Folien gefunden."});return;}
      await sb.from("cards").insert(rows);
      setData(d=>({...d,cards:[...d.cards,...rows.map(r=>({id:r.id,setId:r.set_id,questionHtml:r.question_html,answerHtml:r.answer_html,lastRating:null,mcqOptions:null,createdAt:r.created_at}))]}));
      setModal({type:"pdfDone",count:rows.length});
    }catch(e){setModal({type:"pdfError",msg:e.message});}
  };
  const shareSet=sid=>{
    const s=data.sets.find(x=>x.id===sid);const c=data.cards.filter(x=>x.setId===sid);
    const payload=btoa(JSON.stringify({set:s,cards:c.map(x=>({questionHtml:x.questionHtml,answerHtml:x.answerHtml}))}));
    const url=`${window.location.origin}${window.location.pathname}?share=${payload}`;
    navigator.clipboard.writeText(url).catch(()=>{});setModal({type:"share",url});
  };

  const folder=data.folders.find(f=>f.id===sel.folderId);
  const set=data.sets.find(s=>s.id===sel.setId);
  const folderSets=data.sets.filter(s=>s.folderId===sel.folderId);
  const setCCards=data.cards.filter(c=>c.setId===sel.setId);
  const rootFolders=data.folders.filter(f=>!f.parentId).map(f=>{
    const fs=data.sets.filter(s=>s.folderId===f.id);const fc=data.cards.filter(c=>fs.some(s=>s.id===c.setId));
    return{...f,setCount:fs.length,cardCount:fc.length,progress:calcProgress(fc)};
  });

  if(studyMode){
    const sc=data.cards.filter(c=>c.setId===studyMode.setId).slice(0,studyMode.count);
    const ss=data.sets.find(s=>s.id===studyMode.setId);const Exit=()=>setStudyMode(null);
    if(studyMode.mode==="flash") return <FlashMode set={ss} cards={sc} onExit={Exit} onRate={updateCardRating}/>;
    return <MCQMode set={ss} cards={sc} onExit={Exit} onRate={updateCardRating} onCacheMCQ={cacheCardMCQ}/>;
  }

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <aside style={{width:"var(--sw)",minWidth:"var(--sw)",height:"100vh",background:"linear-gradient(180deg,#FFF,#FDFCFA)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"20px 18px 16px",borderBottom:"1px solid var(--border)",background:"linear-gradient(160deg,#FFF5EE,#FFFAF7 60%,#FFF)"}}>
          <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:22,background:"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-.3px"}}>Heribert ✦</div>
          <div style={{fontSize:13,color:"var(--muted)",marginTop:4}}>Hallo, <b style={{color:"var(--text)"}}>{userName.split(" ")[0]}</b> 👋</div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"10px 8px"}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--muted2)",padding:"8px 10px 6px",letterSpacing:".08em",textTransform:"uppercase"}}>Lernbereiche</div>
          {loading?<div style={{padding:"12px 10px",color:"var(--muted2)",fontSize:13,display:"flex",alignItems:"center",gap:8}}><ISpin c="var(--muted2)" s={16}/> Lädt…</div>
            :rootFolders.length===0?<div style={{padding:"8px 10px",fontSize:13,color:"var(--muted2)"}}>Noch keine Ordner</div>
            :rootFolders.map(f=><SidebarFolder key={f.id} folder={f} isActive={sel.folderId===f.id} onClick={()=>setSel({folderId:f.id,setId:null})} onDelete={()=>{if(confirm(`"${f.name}" löschen?`)) removeFolder(f.id);}} onRename={name=>renameFolder(f.id,name)}/>)
          }
          <button className="folder-row" onClick={()=>setModal({type:"folder"})} style={{border:"1.5px dashed var(--border)",color:"var(--muted)",fontSize:13,marginTop:6,background:"transparent",width:"100%"}}>
            <IPlus/> Neuer Ordner
          </button>
        </div>
        <div style={{borderTop:"1px solid var(--border)",padding:"10px 8px",background:"linear-gradient(0deg,#FFF8F4,#FFF)"}}>
          <button className="folder-row" onClick={()=>setProfileOpen(true)} style={{width:"100%",justifyContent:"flex-start"}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:"var(--grad)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0}}>{userName.charAt(0).toUpperCase()}</div>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{userName}</div>
              <div style={{fontSize:11,color:"var(--muted2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.email}</div>
            </div>
            <button className="btn-danger" onClick={e=>{e.stopPropagation();onLogout();}} style={{padding:"4px 6px"}}><ILogout/></button>
          </button>
        </div>
      </aside>

      <main style={{flex:1,overflowY:"auto",padding:"40px 48px",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4 40%,#F5F4F1)"}}>
        {loading?<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",gap:12,color:"var(--muted)"}}><ISpin/><span style={{fontSize:15}}>Daten werden geladen…</span></div>:<>
          {!sel.folderId&&<HomeView userName={userName} data={data} onSelectFolder={fid=>setSel({folderId:fid,setId:null})}/>}
          {sel.folderId&&!sel.setId&&<FolderView folder={folder} sets={folderSets} data={data}
            onBack={()=>setSel({folderId:null,setId:null})} onNewSet={()=>setModal({type:"set"})}
            onSelectSet={sid=>setSel(p=>({...p,setId:sid}))} onLearn={sc=>setStudyConfig(sc)}
            onDeleteSet={sid=>{if(confirm("Set löschen?")) removeSet(sid);}} onRenameSet={renameSet} onShare={shareSet}/>}
          {sel.setId&&<SetView set={set} folder={folder} cards={setCCards}
            onBack={()=>setSel(p=>({...p,setId:null}))} onNewCard={()=>setModal({type:"card"})}
            onEditCard={c=>{setEditCard(c);setModal({type:"card"});}} onDeleteCard={removeCard}
            onLearn={()=>setStudyConfig({setId:sel.setId,cards:setCCards})} onShare={()=>shareSet(sel.setId)}
            onImportPDF={importPDF}/>}
        </>}
      </main>

      {studyConfig&&<StudyConfigModal config={studyConfig} onStart={cfg=>{setStudyConfig(null);setStudyMode(cfg);}} onClose={()=>setStudyConfig(null)}/>}
      {profileOpen&&<ProfileModal user={user} userName={userName} onClose={()=>setProfileOpen(false)}/>}
      {modal?.type==="folder"&&<FolderModal onSave={createFolder} onClose={()=>setModal(null)}/>}
      {modal?.type==="set"&&<SetModal onSave={createSet} onClose={()=>setModal(null)}/>}
      {modal?.type==="card"&&<CardModal card={editCard} saving={saving} onSave={c=>{saveCard(c);setEditCard(null);}} onClose={()=>{setModal(null);setEditCard(null);}}/>}
      {modal?.type==="share"&&<div className="overlay" onClick={()=>setModal(null)}><div className="modal si" style={{maxWidth:500,padding:32}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:20,marginBottom:8}}>Set teilen ✦</h3>
        <p style={{color:"var(--muted)",fontSize:14,marginBottom:16}}>Link in Zwischenablage kopiert.</p>
        <div style={{background:"linear-gradient(160deg,#F5F3EF,#EDEAE4)",borderRadius:10,padding:"10px 14px",fontSize:11,wordBreak:"break-all",color:"var(--muted)",marginBottom:20,fontFamily:"monospace"}}>{modal.url}</div>
        <button className="btn-o" onClick={()=>setModal(null)} style={{justifyContent:"center"}}>Fertig</button>
      </div></div>}
      {modal?.type==="pdfDone"&&<div className="overlay" onClick={()=>setModal(null)}><div className="modal si" style={{maxWidth:400,padding:32,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:48,marginBottom:12}}>📄</div>
        <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:20,marginBottom:8}}>{modal.count} Karten erstellt</h3>
        <p style={{color:"var(--muted)",fontSize:14,marginBottom:24}}>Slide-Titel = Frage · Inhalt = Antwort · Bearbeitbar.</p>
        <button className="btn-o" onClick={()=>setModal(null)} style={{justifyContent:"center"}}>Super!</button>
      </div></div>}
      {modal?.type==="pdfError"&&<div className="overlay" onClick={()=>setModal(null)}><div className="modal si" style={{maxWidth:400,padding:32,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
        <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:20,marginBottom:8}}>PDF-Fehler</h3>
        <p style={{color:"var(--muted)",fontSize:14,marginBottom:24}}>{modal.msg}</p>
        <button className="btn-g" onClick={()=>setModal(null)}>Schließen</button>
      </div></div>}
    </div>
  );
}

// ─── FOLDER VIEW ──────────────────────────────────────────────────────────────
function FolderView({folder,sets,data,onBack,onNewSet,onSelectSet,onLearn,onDeleteSet,onRenameSet,onShare}){
  return(
    <div className="au">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:32,flexWrap:"wrap",gap:16}}>
        <div>
          <button style={{display:"flex",alignItems:"center",gap:6,border:"none",background:"none",color:"var(--muted)",fontSize:14,cursor:"pointer",fontFamily:"inherit",marginBottom:12,padding:"4px 0",transition:"color .15s"}} onClick={onBack} onMouseEnter={e=>e.currentTarget.style.color="var(--text)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}><IBack/> Übersicht</button>
          <h1 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:28}}>{folder?.name}</h1>
          <div style={{color:"var(--muted)",fontSize:14,marginTop:4}}>

// ─── FLASH MODE ───────────────────────────────────────────────────────────────
function FlashMode({set,cards,onExit,onRate,readOnly}){
  const [idx,setIdx]=useState(0);const [flipped,setFlipped]=useState(false);const [ratings,setRatings]=useState([]);const [done,setDone]=useState(false);
  const card=cards[idx];
  const rate=r=>{if(!readOnly&&onRate) onRate(card.id,r);const nr=[...ratings,r];setRatings(nr);if(idx+1>=cards.length){setDone(true);return;}setTimeout(()=>{setFlipped(false);setIdx(p=>p+1);},200);};
  if(done){
    const dist=RATINGS.map((r,i)=>({...r,count:ratings.filter(x=>x===i).length}));
    return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",padding:20}}>
      <div className="au" style={{textAlign:"center",maxWidth:480}}>
        <div style={{fontSize:56,marginBottom:16}}>{dist[3].count>cards.length/2?"🏆":dist[2].count>cards.length/2?"📈":"💪"}</div>
        <h2 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:28,marginBottom:24}}>Session abgeschlossen!</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:32}}>
          {dist.map(r=><div key={r.label} style={{background:"linear-gradient(160deg,#FFF,#FDFCFA)",border:"1.5px solid var(--border)",borderRadius:12,padding:"14px 8px",textAlign:"center"}}><div style={{fontSize:24,marginBottom:4}}>{r.emoji}</div><div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:22,color:r.c}}>{r.count}</div><div style={{fontSize:11,color:"var(--muted)"}}>{r.label}</div></div>)}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}><button className="btn-g" onClick={()=>{setIdx(0);setFlipped(false);setRatings([]);setDone(false);}}>Nochmal</button><button className="btn-o" onClick={onExit}>Zurück</button></div>
      </div>
    </div>);
  }
  return(<div style={{minHeight:"100vh",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",padding:"40px 20px",display:"flex",flexDirection:"column",alignItems:"center"}}>
    <div style={{width:"100%",maxWidth:640,marginBottom:28}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <button onClick={onExit} style={{display:"flex",alignItems:"center",gap:6,border:"none",background:"none",color:"var(--muted)",fontSize:14,cursor:"pointer",padding:0,fontFamily:"inherit",transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="var(--text)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}><IBack/> {set?.name}</button>
        <span style={{fontSize:14,fontWeight:600,color:"var(--muted)"}}>{idx+1} / {cards.length}</span>
      </div>
      <div className="prog-track"><div className="prog-fill" style={{width:`${(idx/cards.length)*100}%`}}/></div>
    </div>
    <div className="flip-wrap" style={{width:"100%",maxWidth:640,marginBottom:24}} onClick={()=>setFlipped(p=>!p)}>
      <div className={`flip-inner${flipped?" flipped":""}`} style={{height:280}}>
        <div className="flip-f" style={{position:"absolute",inset:0,background:"linear-gradient(160deg,#FFF,#FDFCFA)",border:"2px solid var(--border)",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:32}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:16}}>Frage</div>
          <div style={{fontSize:18,lineHeight:1.6,textAlign:"center"}} dangerouslySetInnerHTML={{__html:card?.questionHtml||""}}/>
        </div>
        <div className="flip-b" style={{position:"absolute",inset:0,background:"linear-gradient(160deg,#FFF3EC,#FFF8F4)",border:"2px solid var(--ob)",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:32}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--orange)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:16}}>Antwort</div>
          <div style={{fontSize:17,lineHeight:1.7,textAlign:"center"}} dangerouslySetInnerHTML={{__html:card?.answerHtml||""}}/>
        </div>
      </div>
    </div>
    {!flipped?<button className="btn-o" onClick={()=>setFlipped(true)}>Antwort zeigen</button>
      :<div className="au" style={{width:"100%",maxWidth:640}}>
        <div style={{fontSize:13,fontWeight:500,color:"var(--muted)",textAlign:"center",marginBottom:12}}>Wie gut kennst du das?</div>
        <div style={{display:"flex",gap:10}}>
          {RATINGS.map((r,i)=><button key={r.label} onClick={()=>rate(i)} style={{flex:1,padding:"12px 6px",border:"2px solid var(--border)",borderRadius:12,background:"linear-gradient(160deg,#FFF,#FDFCFA)",cursor:"pointer",fontSize:22,display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all .15s",fontFamily:"inherit"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=r.c;e.currentTarget.style.background=`${r.c}18`;e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="linear-gradient(160deg,#FFF,#FDFCFA)";e.currentTarget.style.transform="translateY(0)";}}>
            {r.emoji}<span style={{fontSize:11,color:"var(--muted)",fontWeight:500}}>{r.label}</span>
          </button>)}
        </div>
      </div>}
  </div>);

// ─── MCQ MODE ─────────────────────────────────────────────────────────────────
function MCQMode({set,cards,onExit,onRate,onCacheMCQ,readOnly}){
  const [idx,setIdx]=useState(0);const [optsMap,setOptsMap]=useState({});const [loadingMCQ,setLoadingMCQ]=useState(true);
  const [picked,setPicked]=useState(null);const [score,setScore]=useState(0);const [done,setDone]=useState(false);const [shuffledOpts,setShuffledOpts]=useState(null);
  const card=cards[idx];
  useEffect(()=>{(async()=>{setLoadingMCQ(true);const map={};for(const c of cards){if(c.mcqOptions){map[c.id]=c.mcqOptions;}else{const w=await genMCQ(c.questionHtml,c.answerHtml);if(w){map[c.id]=w;if(!readOnly&&onCacheMCQ) onCacheMCQ(c.id,w);}else{map[c.id]=["Option A","Option B","Option C"];}}}setOptsMap(map);setLoadingMCQ(false);})();},[]);
  useEffect(()=>{if(optsMap[card?.id]){const correct=strip(card.answerHtml)||"Richtige Antwort";const all=[...optsMap[card.id].map(w=>({text:w,ok:false})),{text:correct,ok:true}];for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}setShuffledOpts(all);setPicked(null);}},[idx,optsMap]);
  const pick=(opt,i)=>{if(picked!==null) return;setPicked(i);if(!readOnly&&onRate) onRate(card.id,opt.ok?2:0);if(opt.ok) setScore(p=>p+1);};
  const next=()=>{if(idx+1>=cards.length){setDone(true);return;}setIdx(p=>p+1);};
  if(loadingMCQ) return(<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",gap:16}}><ISpin/><div style={{color:"var(--muted)",fontSize:14}}>KI generiert Antwortoptionen <span style={{color:"var(--muted2)",fontSize:12}}>(einmalig, dann gecacht)</span></div></div>);
  if(done){const pct=Math.round((score/cards.length)*100);return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",padding:20}}><div className="au" style={{textAlign:"center",maxWidth:440}}><div style={{fontSize:56,marginBottom:16}}>{pct>=80?"🏆":pct>=50?"📈":"💪"}</div><h2 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:28,marginBottom:8}}>Ergebnis</h2><div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:52,background:pct>=80?"linear-gradient(135deg,#22C55E,#16A34A)":"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>{pct}%</div><div style={{color:"var(--muted)",marginBottom:32}}>{score} von {cards.length} richtig</div><div style={{display:"flex",gap:10,justifyContent:"center"}}><button className="btn-g" onClick={()=>{setIdx(0);setScore(0);setDone(false);}}>Nochmal</button><button className="btn-o" onClick={onExit}>Zurück</button></div></div></div>);}
  return(<div style={{minHeight:"100vh",background:"linear-gradient(160deg,#FFF8F4,#F8F7F4)",padding:"40px 20px",display:"flex",flexDirection:"column",alignItems:"center"}}>
    <div style={{width:"100%",maxWidth:640,marginBottom:28}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <button onClick={onExit} style={{display:"flex",alignItems:"center",gap:6,border:"none",background:"none",color:"var(--muted)",fontSize:14,cursor:"pointer",padding:0,fontFamily:"inherit",transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="var(--text)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}><IBack/> {set?.name}</button>
        <span style={{fontSize:14,fontWeight:600,color:"var(--muted)"}}>{idx+1} / {cards.length} · {score} ✓</span>
      </div>
      <div className="prog-track"><div className="prog-fill" style={{width:`${(idx/cards.length)*100}%`}}/></div>
    </div>
    <div style={{width:"100%",maxWidth:640,background:"linear-gradient(160deg,#FFF,#FDFCFA)",border:"2px solid var(--border)",borderRadius:18,padding:28,marginBottom:16}}><div style={{fontSize:11,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Frage {idx+1}</div><div style={{fontSize:18,lineHeight:1.6}} dangerouslySetInnerHTML={{__html:card?.questionHtml||""}}/></div>
    <div style={{width:"100%",maxWidth:640,display:"flex",flexDirection:"column",gap:10}}>
      {(shuffledOpts||[]).map((opt,i)=>{let bg="linear-gradient(160deg,#FFF,#FDFCFA)",bc="var(--border)",color="var(--text)";if(picked!==null){if(opt.ok){bg="linear-gradient(160deg,#F0FDF4,#DCFCE7)";bc="var(--gm)";color="#15803D";}else if(i===picked&&!opt.ok){bg="linear-gradient(160deg,#FEF2F2,#FEE2E2)";bc="var(--red)";color="#DC2626";}}return(
        <button key={i} onClick={()=>pick(opt,i)} style={{padding:"15px 20px",border:`2px solid ${bc}`,borderRadius:12,background:bg,color,fontSize:15,textAlign:"left",cursor:picked!==null?"default":"pointer",transition:"all .15s",fontFamily:"inherit",display:"flex",alignItems:"center",gap:10}} onMouseEnter={e=>{if(picked===null){e.currentTarget.style.borderColor="var(--orange)";e.currentTarget.style.background="linear-gradient(160deg,#FFF3EC,#FFE8D8)";}}} onMouseLeave={e=>{if(picked===null){e.currentTarget.style.borderColor=bc;e.currentTarget.style.background=bg;}}}>
          <span style={{width:24,height:24,borderRadius:6,background:picked!==null&&opt.ok?"#22C55E":picked===i&&!opt.ok?"#DC2626":"var(--border)",color:picked!==null&&(opt.ok||i===picked)?"#fff":"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,transition:"all .15s"}}>{String.fromCharCode(65+i)}</span>
          {opt.text}
        </button>
      );})}
    </div>
    {picked!==null&&<div className="au" style={{marginTop:20}}><button className="btn-o" onClick={next}>{idx+1>=cards.length?"Ergebnisse →":"Nächste Frage →"}</button></div>}
  </div>);
}

// ─── PROFILE MODAL ────────────────────────────────────────────────────────────
function ProfileModal({user,userName,onClose}){
  const [name,setName]=useState(userName);const [pw,setPw]=useState("");const [pw2,setPw2]=useState("");
  const [err,setErr]=useState("");const [ok,setOk]=useState(false);const [busy,setBusy]=useState(false);
  const save=async()=>{
    setErr("");setBusy(true);
    try{if(!name.trim()){setErr("Name darf nicht leer sein.");return;}if(pw&&pw.length<6){setErr("Passwort mind. 6 Zeichen.");return;}if(pw&&pw!==pw2){setErr("Passwörter stimmen nicht überein.");return;}
      const updates={data:{display_name:name.trim()}};if(pw) updates.password=pw;
      const {error}=await sb.auth.updateUser(updates);if(error) setErr(error.message);else setOk(true);
    }finally{setBusy(false);}
  };
  return(<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:440,padding:32}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:20,marginBottom:4}}>Profil</h3>
    <p style={{color:"var(--muted)",fontSize:14,marginBottom:24}}>{user.email}</p>
    {ok&&<div style={{color:"var(--green)",fontWeight:500,marginBottom:16,padding:"10px 14px",background:"var(--gl)",borderRadius:8}}>✓ Gespeichert!</div>}
    <Inp label="Name" value={name} onChange={setName}/>
    <Inp label="Neues Passwort (optional)" type="password" placeholder="Leer = unverändert" value={pw} onChange={setPw}/>
    {pw&&<Inp label="Passwort bestätigen" type="password" placeholder="••••••••" value={pw2} onChange={setPw2}/>}
    {err&&<div style={{color:"var(--red)",fontSize:13,marginBottom:14,padding:"10px 14px",background:"var(--rl)",borderRadius:8}}>{err}</div>}
    <div style={{display:"flex",gap:10}}><button className="btn-g" onClick={onClose}>Abbrechen</button><button className="btn-o" onClick={save} disabled={busy}>{busy?<ISpin c="#fff" s={16}/>:"Speichern"}</button></div>
  </div></div>);
}

// ─── FOLDER MODAL ─────────────────────────────────────────────────────────────
function FolderModal({onSave,onClose}){
  const [name,setName]=useState("");const [color,setColor]=useState(COLORS[0]);
  return(<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:400,padding:32}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:20,marginBottom:20}}>Neuer Lernbereich</h3>
    <Inp label="Name" placeholder="z.B. Marketing, Biologie …" value={name} onChange={setName} onEnter={()=>name.trim()&&onSave(name.trim(),color)}/>
    <div style={{marginBottom:20}}><label style={{display:"block",fontSize:13,fontWeight:500,color:"var(--muted)",marginBottom:8}}>Farbe</label><div style={{display:"flex",gap:8}}>{COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:8,background:c,border:color===c?`3px solid ${c}`:"3px solid transparent",outline:color===c?`2px solid ${c}`:"none",outlineOffset:2,cursor:"pointer",transition:"all .12s"}}/>)}</div></div>
    <div style={{display:"flex",gap:10}}><button className="btn-g" onClick={onClose}>Abbrechen</button><button className="btn-o" onClick={()=>name.trim()&&onSave(name.trim(),color)}>Erstellen</button></div>
  </div></div>);
}

// ─── SET MODAL ────────────────────────────────────────────────────────────────
function SetModal({onSave,onClose}){
  const [name,setName]=useState("");const [desc,setDesc]=useState("");
  return(<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:400,padding:32}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:20,marginBottom:20}}>Neues Set</h3>
    <Inp label="Name" placeholder="z.B. Kapitel 3 …" value={name} onChange={setName}/>
    <Inp label="Beschreibung (optional)" placeholder="Worum geht es?" value={desc} onChange={setDesc} onEnter={()=>name.trim()&&onSave(name.trim(),desc)}/>
    <div style={{display:"flex",gap:10}}><button className="btn-g" onClick={onClose}>Abbrechen</button><button className="btn-o" onClick={()=>name.trim()&&onSave(name.trim(),desc)}>Erstellen</button></div>
  </div></div>);
}

// ─── CARD MODAL ───────────────────────────────────────────────────────────────
function CardModal({card,saving,onSave,onClose}){
  const qRef=useRef();const aRef=useRef();
  useEffect(()=>{if(qRef.current) qRef.current.innerHTML=card?.questionHtml||"";if(aRef.current) aRef.current.innerHTML=card?.answerHtml||"";},[]);
  const fmt=(cmd,val=null)=>document.execCommand(cmd,false,val);
  const insImg=async(file,ref)=>{const reader=new FileReader();reader.onload=e=>{ref.current?.focus();document.execCommand("insertImage",false,e.target.result);};reader.readAsDataURL(file);};
  const ToolBar=({targetRef})=>(<div style={{display:"flex",flexWrap:"wrap",gap:4,padding:"8px 10px",borderBottom:"1px solid var(--border)",background:"linear-gradient(160deg,#F8F6F3,#F0EDE8)"}}>
    {[["bold","B"],["italic","I"],["underline","U"]].map(([cmd,lbl])=><button key={cmd} onMouseDown={e=>{e.preventDefault();fmt(cmd);}} style={{width:26,height:26,border:"1px solid var(--border)",borderRadius:5,background:"linear-gradient(160deg,#FFF,#F8F6F3)",fontFamily:cmd==="bold"?"serif":"inherit",fontWeight:cmd==="bold"?700:400,fontStyle:cmd==="italic"?"italic":"normal",textDecoration:cmd==="underline"?"underline":"none",fontSize:12,cursor:"pointer",transition:"all .12s"}} onMouseEnter={e=>e.currentTarget.style.background="linear-gradient(160deg,#FFF3EC,#FFE8D8)"} onMouseLeave={e=>e.currentTarget.style.background="linear-gradient(160deg,#FFF,#F8F6F3)"}>{lbl}</button>)}
    <button onMouseDown={e=>{e.preventDefault();fmt("insertUnorderedList");}} style={{width:26,height:26,border:"1px solid var(--border)",borderRadius:5,background:"linear-gradient(160deg,#FFF,#F8F6F3)",fontSize:12,cursor:"pointer",transition:"all .12s"}} onMouseEnter={e=>e.currentTarget.style.background="linear-gradient(160deg,#FFF3EC,#FFE8D8)"} onMouseLeave={e=>e.currentTarget.style.background="linear-gradient(160deg,#FFF,#F8F6F3)"}>•</button>
    <button onMouseDown={e=>{e.preventDefault();fmt("insertOrderedList");}} style={{width:26,height:26,border:"1px solid var(--border)",borderRadius:5,background:"linear-gradient(160deg,#FFF,#F8F6F3)",fontSize:11,cursor:"pointer",transition:"all .12s"}} onMouseEnter={e=>e.currentTarget.style.background="linear-gradient(160deg,#FFF3EC,#FFE8D8)"} onMouseLeave={e=>e.currentTarget.style.background="linear-gradient(160deg,#FFF,#F8F6F3)"}>1.</button>
    {["#EF4444","#F5631A","#F59E0B","#22C55E","#3B82F6","#8B5CF6"].map(c=><button key={c} onMouseDown={e=>{e.preventDefault();fmt("foreColor",c);}} style={{width:18,height:18,borderRadius:4,background:c,border:"2px solid rgba(0,0,0,.1)",cursor:"pointer",transition:"transform .12s"}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.2)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}/>)}
    <label style={{width:26,height:26,border:"1px solid var(--border)",borderRadius:5,background:"linear-gradient(160deg,#FFF,#F8F6F3)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,transition:"all .12s"}} onMouseEnter={e=>e.currentTarget.style.background="linear-gradient(160deg,#FFF3EC,#FFE8D8)"} onMouseLeave={e=>e.currentTarget.style.background="linear-gradient(160deg,#FFF,#F8F6F3)"}>🖼<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&insImg(e.target.files[0],targetRef)}/></label>
  </div>);
  const save=()=>{const q=qRef.current?.innerHTML||"";const a=aRef.current?.innerHTML||"";if(!strip(q)&&!strip(a)) return;onSave({...(card||{}),questionHtml:q,answerHtml:a,mcqOptions:null});};
  return(<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:580,padding:0}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"24px 28px 16px",borderBottom:"1px solid var(--border)",background:"linear-gradient(160deg,#FFF8F4,#FFF)"}}><h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:18}}>{card?"Karte bearbeiten":"Neue Karte"}</h3></div>
    {[{label:"Frage",ref:qRef,ph:"Frage eingeben …"},{label:"Antwort",ref:aRef,ph:"Antwort eingeben …"}].map(({label,ref,ph})=>(<div key={label} style={{borderBottom:"1px solid var(--border)"}}>
      <div style={{fontSize:12,fontWeight:600,color:"var(--muted)",padding:"10px 14px 0",textTransform:"uppercase",letterSpacing:".06em"}}>{label}</div>
      <ToolBar targetRef={ref}/>
      <div className="rich" contentEditable ref={ref} data-ph={ph} onDrop={e=>{e.preventDefault();const f=e.dataTransfer?.files?.[0];if(f?.type.startsWith("image/")) insImg(f,ref);}} onDragOver={e=>e.preventDefault()} style={{minHeight:90,fontSize:15}}/>
    </div>))}
    <div style={{padding:"16px 28px",display:"flex",gap:10,justifyContent:"flex-end",background:"linear-gradient(160deg,#FDFCFA,#FFF)"}}>
      <button className="btn-g" onClick={onClose}>Abbrechen</button>
      <button className="btn-o" onClick={save} disabled={saving}>{saving?<ISpin c="#fff" s={16}/>:(card?"Speichern":"Erstellen")}</button>
    </div>
  </div></div>);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function Inp({label,type="text",placeholder,value,onChange,onEnter}){
  return(<div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:500,color:"var(--muted)",marginBottom:6}}>{label}</label>
    <input type={type} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onEnter?.()}
      style={{width:"100%",padding:"10px 14px",border:"1.5px solid var(--border)",borderRadius:9,fontSize:14,background:"linear-gradient(160deg,#FFF,#FDFCFA)",color:"var(--text)",outline:"none",fontFamily:"inherit",transition:"border-color .15s"}}
      onFocus={e=>e.target.style.borderColor="var(--orange)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
  </div>);
}
function EmptyState({icon,title,sub,btnLabel,onBtn}){
  return(<div style={{textAlign:"center",padding:"60px 20px",color:"var(--muted)"}}>
    <div style={{fontSize:48,marginBottom:12}}>{icon}</div>
    <div style={{fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:18,color:"var(--text)",marginBottom:8}}>{title}</div>
    <div style={{fontSize:14,marginBottom:24,maxWidth:320,margin:"0 auto 24px"}}>{sub}</div>
    {onBtn&&btnLabel&&<button className="btn-o" onClick={onBtn}>{btnLabel}</button>}
  </div>);
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>

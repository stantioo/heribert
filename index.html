// Convert HTML (as used in card questionHtml/answerHtml) to plain text,
// keeping paragraph structure as newlines.
function htmlToPlainText(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  let out = "";
  const walk = n => {
    if (n.nodeType === 3) { out += n.textContent; return; }
    if (n.nodeName === "BR") { out += "\n"; return; }
    if (/^(P|DIV|LI|H[1-6])$/.test(n.nodeName) && out && !out.endsWith("\n")) out += "\n";
    for (const c of n.childNodes) walk(c);
    if (/^(P|DIV|LI|H[1-6])$/.test(n.nodeName) && !out.endsWith("\n")) out += "\n";
  };
  walk(div);
  return out.replace(/\n{3,}/g, "\n\n").trim();
}

function csvEscape(s) {
  const str = String(s ?? "").replace(/"/g, '""');
  return /[",\n\r]/.test(str) ? `"${str}"` : str;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function safeFilename(s) {
  return String(s || "Set").replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, " ").trim().slice(0, 80) || "Set";
}

function exportSetCSV(set, cards) {
  const header = ["Frage","Antwort"].map(csvEscape).join(",");
  const rows = cards.map(c => [csvEscape(htmlToPlainText(c.questionHtml)), csvEscape(htmlToPlainText(c.answerHtml))].join(","));
  const csv = "\uFEFF" + [header, ...rows].join("\r\n");
  downloadBlob(new Blob([csv], {type:"text/csv;charset=utf-8"}), `${safeFilename(set.name)}.csv`);
}

// Generate 3 plausible wrong answers for MCQ mode.
// Calls the "generate-mcq" Supabase Edge Function (Gemini under the hood).
// Retries up to 2x with exponential backoff on failure (handles Gemini rate-limiting).
async function genMCQ(q, a) {
  const url = `${SUPABASE_URL}/functions/v1/generate-mcq`;
  const body = JSON.stringify({ question: strip(q).slice(0, 180), answer: strip(a).slice(0, 180) });
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
        body
      });
      const resp = await r.json().catch(() => ({}));
      if (r.ok && resp && Array.isArray(resp.answers) && resp.answers.length >= 3) {
        return resp.answers.slice(0, 3).map(x => String(x));
      }
      // 429 / 5xx → wait and retry. Other failures still get one more shot.
      if (attempt < 2) {
        const delay = r.status === 429 ? 1500 * (attempt + 1) : 600 * (attempt + 1);
        await new Promise(res => setTimeout(res, delay));
        continue;
      }
      console.warn("MCQ-Generation fehlgeschlagen:", r.status, resp);
    } catch (e) {
      if (attempt < 2) { await new Promise(res => setTimeout(res, 600 * (attempt + 1))); continue; }
      console.warn("MCQ-Generation fehlgeschlagen:", e);
    }
  }
  return null;
}

// Generate a plausible wrong-answer set locally when the AI is rate-limited.
// Much better than the old "Option A / B / C" fallback — uses the correct
// answer's own word pool so the distractors at least look topical.
function localMCQFallback(q, a) {
  const aText = strip(a);
  const qText = strip(q);
  const pool = (aText + " " + qText).split(/[\s,.;:!?()\[\]"'–—-]+/).filter(w => w.length >= 4);
  const uniq = [...new Set(pool)];
  const pick = () => uniq.length ? uniq.splice(Math.floor(Math.random() * uniq.length), 1)[0] : null;
  const base = aText.slice(0, 40);
  const w1 = pick() || "unklar";
  const w2 = pick() || "keine Angabe";
  const w3 = pick() || "unbekannt";
  return [`Nicht ${w1}`, `Eher ${w2}`, `Vielleicht ${w3}`].slice(0, 3);
}

// Safely resize an image file to a TINY thumbnail for JWT-safe storage.
// 128×128 at JPEG 55% ≈ 4-6 KB — sharp and still JWT-safe
// without bloating the JWT token (which caused 520 errors at ~30KB+).
const MAX_AVATAR_BYTES = 7000; // hard cap — ~7KB keeps JWT well under danger zone (~30KB+)
const resizeImageDataUrl = (file, maxSize=128, quality=0.55) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxSize/img.width, maxSize/img.height, 1);
      const w = Math.max(1, Math.round(img.width*scale));
      const h = Math.max(1, Math.round(img.height*scale));
      const cv = document.createElement("canvas");
      cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(img, 0, 0, w, h);
      const dataUrl = cv.toDataURL("image/jpeg", quality);
      if (dataUrl.length > MAX_AVATAR_BYTES) {
        reject(new Error(`Bild zu groß (${Math.round(dataUrl.length/1024)}KB). Bitte ein kleineres Bild wählen.`));
        return;
      }
      resolve(dataUrl);
    };
    img.onerror = reject;
    img.src = ev.target.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

// ─── SMART SAMPLING ────────────────────────────────────────────────────
// Pick up to `count` cards using spaced-repetition-style weighting.
// Unseen & hard cards get priority; mastered cards are rarely re-shown.
// lastRating: null=unseen, 0=Schwer, 1=Ok, 2=Gut, 3=Super
function pickStudyCards(cards, count) {
  if (!cards.length) return [];
  if (cards.length <= count) {
    // Small pool: include all, but order so hard ones come first
    return [...cards].sort((a,b) => {
      const wa = cardWeight(a), wb = cardWeight(b);
      return wb - wa;
    });
  }
  const pool = cards.map(c => ({ card: c, weight: cardWeight(c) }));
  const picked = [];
  for (let i = 0; i < count && pool.length > 0; i++) {
    const total = pool.reduce((s, x) => s + x.weight, 0);
    if (total <= 0) {
      const idx = Math.floor(Math.random() * pool.length);
      picked.push(pool[idx].card); pool.splice(idx, 1); continue;
    }
    let r = Math.random() * total;
    for (let j = 0; j < pool.length; j++) {
      r -= pool[j].weight;
      if (r <= 0) { picked.push(pool[j].card); pool.splice(j, 1); break; }
    }
  }
  // Shuffle picked order so session feels fresh
  for (let i = picked.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [picked[i], picked[j]] = [picked[j], picked[i]];
  }
  return picked;
}
function cardWeight(c) {
  const r = c.lastRating;
  if (r == null) return 10;   // unseen → highest priority
  if (r === 0)   return 8;    // hard  → high priority
  if (r === 1)   return 5;    // ok    → medium priority
  if (r === 2)   return 2;    // gut   → low priority
  return 0.4;                 // super → rare re-appearance
}

        {tab==="register" && <Inp label={t.name} placeholder="Dein Name" value={f.name} onChange={up("name")}/>}
        <Inp label={t.email} type="email" placeholder="du@beispiel.de" value={f.email} onChange={up("email")}/>
        <Inp label={t.password} type="password" placeholder="••••••••" value={f.pw} onChange={up("pw")} onEnter={submit}/>
        {err && <div style={{color:"var(--red)",fontSize:13,marginBottom:14,padding:"10px 14px",background:"var(--rl)",borderRadius:8}}>{err}</div>}
        {info && <div style={{color:"var(--green)",fontSize:13,marginBottom:14,padding:"10px 14px",background:"var(--gl)",borderRadius:8}}>{info}</div>}
        <button className="btn-o" onClick={submit} disabled={busy} style={{width:"100%",padding:"12px",justifyContent:"center",fontSize:15,fontWeight:600,borderRadius:12,opacity:busy?.7:1}}>
          {busy ? <ISpin c="#fff" s={18}/> : (tab==="login" ? t.login : t.createAccount)}
        </button>
      </div>
    </div>
  );
}


// \u2500\u2500\u2500 DASHBOARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function Dashboard({session, onLogout}) {
  const user = session.user;
  const userName = user.user_metadata?.display_name || user.email.split("@")[0];
  const avatarUrl = user.user_metadata?.avatar_url || null;
  const [lang, setLangState] = useState(() => {
    const meta = user.user_metadata?.lang;
    if (meta === "en" || meta === "de") return meta;
    try { const ls = localStorage.getItem("heribert.lang"); if (ls) return ls; } catch {}
    return "de";
  });
  const t = T[lang];
  const setLang = async (l) => {
    setLangState(l);
    try { localStorage.setItem("heribert.lang", l); } catch {}
    try { await sb.auth.updateUser({data:{lang:l}}); } catch {}
  };
  const [data, setData] = useState({folders:[], sets:[], cards:[], shares:[]});
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  // queryWarning removed — was debug-only
  const [sel, setSel] = useState({folderId:null, setId:null});
  const [searchQuery, setSearchQuery] = useState("");
  const [studyConfig, setStudyConfig] = useState(null);
  const [studyMode, setStudyMode] = useState(null);
  const [modal, setModal] = useState(null);
  const [editCard, setEditCard] = useState(null);
  const [editFolder, setEditFolder] = useState(null);
  const [profileOpen, setProfileOpen] = useState(false);
  const [saving, setSaving] = useState(false);
  const mobile=useMobile();
  const [menuOpen,setMenuOpen]=useState(false);
  const [sideCollapsed,setSideCollapsed]=useState(false);
  const [sideFilter,setSideFilter]=useState("all"); // "all"|"own"|"shared"
  // Shared-folder visibility preference (persisted in localStorage).
  const [hideShared, setHideSharedState] = useState(() => {
    try { return localStorage.getItem("heribert.hideShared") === "1"; } catch { return false; }
  });
  const setHideShared = v => {
    setHideSharedState(v);
    try { localStorage.setItem("heribert.hideShared", v ? "1" : "0"); } catch {}
  };
  const [confirmGoHome,setConfirmGoHome]=useState(false);
  const studyHasProgress=useRef(false);
  const goHome = () => {
    if (studyMode) {
      if (studyHasProgress.current) { setConfirmGoHome(true); return; }
      setStudyMode(null);
    }
    setStudyConfig(null);
    setSel({folderId:null, setId:null});
    setModal(null);
    setMenuOpen(false);
  };
  const confirmGoHomeYes = () => {
    setConfirmGoHome(false);
    setStudyMode(null);
    setStudyConfig(null);
    setSel({folderId:null, setId:null});
    setModal(null);
    setMenuOpen(false);
  };
  // Navigate to a folder AND close the sidebar (mobile) in one action.
  const openFolder = fid => {
    setSel({folderId:fid, setId:null});
    setMenuOpen(false);
  };

  useEffect(() => { loadAll(); }, []);
  // Safety net: if loadAll doesn't finish within 20 s (network wedge,
  // stuck Supabase call, whatever), surface a retry UI so the user
  // isn't stuck on an endless spinner.
  useEffect(() => {
    if (!loading) return;
    const t = setTimeout(() => {
      if (loading) {
        setLoadError("Das Laden dauert ungewöhnlich lange. Bitte Seite neu laden.");
        setLoading(false);
      }
    }, 20000);
    return () => clearTimeout(t);
  }, [loading]);
  // NOTE: profiles table sync removed — it was crashing PostgREST on free tier
  // when the table didn't exist. Cross-user avatars will show initials only.
  const loadAll = async () => {
    setLoading(true); setLoadError(null);
    // Defensive: EVERY path out of this function must setLoading(false),
    // even if a single query errors out. Otherwise the UI hangs forever
    // on "Daten werden geladen…". Each stage logs so we can diagnose in
    // DevTools which query blew up.
    try {
      const [fr,sr,cr,shr] = await Promise.all([
        sb.from("folders").select("*").order("created_at"),
        sb.from("sets").select("*").order("created_at"),
        sb.from("cards").select("*").order("created_at"),
        sb.from("set_shares").select("*"),
      ]);


      const shares = shr.data || [];
      const myEmail = (user.email || "").toLowerCase();
      const sets = (sr.data||[]).map(r => {
        const s = toSet(r);
        s.ownerId = r.user_id;
        s.isSharedWithMe = r.user_id !== user.id;
        if (s.isSharedWithMe) {
          const sh = shares.find(x => x.set_id === s.id && (x.invited_email || "").toLowerCase() === myEmail);
          s.sharedBy = sh?.owner_email || null;
          s.canEdit = !!sh?.can_edit;
          s.sourceFolderId = sh?.folder_id || s.folderId || null;
          s.sourceFolderName = sh?.folder_name || null;
          s.sourceFolderColor = sh?.folder_color || null;
          s.parentFolderName = sh?.parent_folder_name || null;
          s.parentFolderColor = sh?.parent_folder_color || null;
        }
        return s;
      });

      // For shared sets missing folder metadata: look up the original folders
      // from the DB. This works even when set_shares doesn't have folder_* columns.
      const sharedMissingInfo = sets.filter(s=>s.isSharedWithMe && s.sourceFolderId && !s.sourceFolderName);
      if (sharedMissingInfo.length > 0) {
        const folderIds = [...new Set(sharedMissingInfo.map(s=>s.sourceFolderId).filter(Boolean))];
        try {
          const {data:fdata} = await sb.from("folders").select("id,name,color,parent_id").in("id", folderIds);
          if (fdata && fdata.length) {
            const fmap = new Map(fdata.map(f=>[f.id,f]));
            for (const s of sharedMissingInfo) {
              const f = fmap.get(s.sourceFolderId);
              if (f) {
                s.sourceFolderName = f.name;
                s.sourceFolderColor = f.color;
                if (f.parent_id) {
                  const pf = fdata.find(x=>x.id===f.parent_id) || fmap.get(f.parent_id);
                  if (pf) { s.parentFolderName = pf.name; s.parentFolderColor = pf.color; }
                }
              }
            }
          }
        } catch {}
      }

      setData({
        folders:(fr.data||[]).map(toFolder),
        sets,
        cards:(cr.data||[]).map(toCard),
        shares: shares.filter(x => x.owner_id === user.id),
      });
    } catch (e) {
      setLoadError(String(e?.message || e));
    } finally {
      setLoading(false);
    }
  };

  const createFolder = async (name,color,parentId) => { const id=uid(); await sb.from("folders").insert({id,user_id:user.id,name,color,parent_id:parentId||null}); setData(d=>({...d,folders:[...d.folders,{id,name,color,parentId:parentId||null}]})); setModal(null); };
  const removeFolder = async (fid) => {
    // Also reassign children to top-level
    setData(d=>{const sids=d.sets.filter(s=>s.folderId===fid).map(s=>s.id);return{...d,folders:d.folders.filter(f=>f.id!==fid).map(f=>f.parentId===fid?{...f,parentId:null}:f),sets:d.sets.filter(s=>s.folderId!==fid),cards:d.cards.filter(c=>!sids.includes(c.setId))};});
    await sb.from("folders").update({parent_id:null}).eq("parent_id",fid);
    await sb.from("folders").delete().eq("id",fid);
    if(sel.folderId===fid)setSel({folderId:null,setId:null});
  };
  const renameFolder = async (fid,name) => { await sb.from("folders").update({name}).eq("id",fid); setData(d=>({...d,folders:d.folders.map(f=>f.id===fid?{...f,name}:f)})); };
  const updateFolder = async (fid,name,color,parentId) => { await sb.from("folders").update({name,color,parent_id:parentId===undefined?undefined:(parentId||null)}).eq("id",fid); setData(d=>({...d,folders:d.folders.map(f=>f.id===fid?{...f,name,color,...(parentId!==undefined?{parentId:parentId||null}:{})}:f)})); setModal(null); };
  const createSet = async (name,desc) => {
    const id=uid(); const now=new Date().toISOString();
    await sb.from("sets").insert({id,user_id:user.id,folder_id:sel.folderId,name,description:desc,created_at:now});
    // Propagate folder-level shares to the new set: find all emails currently
    // sharing any sibling set in this folder and add shares for the new set.
    const siblingIds = data.sets.filter(s=>!s.isSharedWithMe && s.folderId===sel.folderId).map(s=>s.id);
    if (siblingIds.length > 0) {
      const {data:sh} = await sb.from("set_shares").select("invited_email").in("set_id", siblingIds);
      const emails = Array.from(new Set((sh||[]).map(x=>(x.invited_email||"").toLowerCase()).filter(Boolean)));
      if (emails.length > 0) {
        await sb.from("set_shares").insert(emails.map(e=>({set_id:id,invited_email:e,owner_email:user.email,owner_id:user.id})));
      }
    }
    setData(d=>({...d,sets:[...d.sets,{id,folderId:sel.folderId,name,description:desc,createdAt:now}]}));
    setModal(null);
  };
  const removeSet = async (sid) => { await sb.from("sets").delete().eq("id",sid); setData(d=>({...d,sets:d.sets.filter(s=>s.id!==sid),cards:d.cards.filter(c=>c.setId!==sid)})); if(sel.setId===sid)setSel(p=>({...p,setId:null})); };
  const renameSet = async (sid,name) => { await sb.from("sets").update({name}).eq("id",sid); setData(d=>({...d,sets:d.sets.map(s=>s.id===sid?{...s,name}:s)})); };

  const saveCard = async (card) => {
    const isNew = !card.id; setSaving(true);
    if (isNew) {
      const id=uid(); const now=new Date().toISOString();
      await sb.from("cards").insert({id,user_id:user.id,set_id:sel.setId,question_html:card.questionHtml,answer_html:card.answerHtml,last_rating:null,mcq_options:null,created_at:now});
      setData(d=>({...d,cards:[...d.cards,{id,setId:sel.setId,questionHtml:card.questionHtml,answerHtml:card.answerHtml,lastRating:null,mcqOptions:null,createdAt:now}]}));
    } else {
      await sb.from("cards").update({question_html:card.questionHtml,answer_html:card.answerHtml,mcq_options:null}).eq("id",card.id);
      setData(d=>({...d,cards:d.cards.map(c=>c.id===card.id?{...c,questionHtml:card.questionHtml,answerHtml:card.answerHtml,mcqOptions:null}:c)}));
    }
    setSaving(false); setEditCard(null); setModal(null);
  };
  const removeCard = async (cid) => { await sb.from("cards").delete().eq("id",cid); setData(d=>({...d,cards:d.cards.filter(c=>c.id!==cid)})); };
  const copyCard = async (card, targetSetId) => {
    const id=uid(); const now=new Date().toISOString();
    await sb.from("cards").insert({id,user_id:user.id,set_id:targetSetId,question_html:card.questionHtml,answer_html:card.answerHtml,last_rating:null,mcq_options:null,created_at:now});
    setData(d=>({...d,cards:[...d.cards,{id,setId:targetSetId,questionHtml:card.questionHtml,answerHtml:card.answerHtml,lastRating:null,mcqOptions:null,createdAt:now}]}));
  };
  const moveCard = async (card, targetSetId) => {
    await sb.from("cards").update({set_id:targetSetId}).eq("id",card.id);
    setData(d=>({...d,cards:d.cards.map(c=>c.id===card.id?{...c,setId:targetSetId}:c)}));
  };
  const updateCardRating = async (cid,rating) => { await sb.from("cards").update({last_rating:rating}).eq("id",cid); setData(d=>({...d,cards:d.cards.map(c=>c.id===cid?{...c,lastRating:rating}:c)})); };
  const cacheCardMCQ = async (cid,opts) => { await sb.from("cards").update({mcq_options:opts}).eq("id",cid); setData(d=>({...d,cards:d.cards.map(c=>c.id===cid?{...c,mcqOptions:opts}:c)})); };

  const loadScript = (url) => new Promise((res,rej) => {
    if (document.querySelector(`script[src="${url}"]`)) { res(); return; }
    const s=document.createElement("script");s.src=url;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
  // Extract text from .docx using mammoth
  const extractDocx = async (buf) => {
    await loadScript(MAMMOTH);
    const result = await mammoth.extractRawText({arrayBuffer:buf});
    return result.value||"";
  };
  // Extract text from .pptx by reading XML slides inside the zip
  const extractPptx = async (buf) => {
    await loadScript(JSZIP);
    const zip = await JSZip.loadAsync(buf);
    const texts = [];
    const slideFiles = Object.keys(zip.files).filter(f=>f.match(/^ppt\/slides\/slide\d+\.xml$/)).sort();
    for (const sf of slideFiles) {
      const xml = await zip.files[sf].async("string");
      const stripped = xml.replace(/<[^>]+>/g," ").replace(/&[a-z]+;/g," ").replace(/\s+/g," ").trim();
      if (stripped.length > 5) texts.push(stripped);
    }
    return texts.join("\n\n---\n\n");
  };

  const importPDF = async (file) => {
    setModal({type:"pdfLoading", stage:"extract", info:`Lese ${file.name}…`});
    try {
      const ext = (file.name||"").split(".").pop().toLowerCase();
      // Old binary formats (.doc, .ppt) are not supported — guide users.
      if (ext === "doc") { setModal({type:"pdfError",msg:t?.importOldDoc||"The old .doc format is not supported. Please save as .docx first."}); return; }
      if (ext === "ppt") { setModal({type:"pdfError",msg:t?.importOldPpt||"The old .ppt format is not supported. Please save as .pptx first."}); return; }
      const buf = await file.arrayBuffer();
      let fullText = "";
      let pageCount = 0;

      if (ext === "docx") {
        fullText = await extractDocx(buf);
        pageCount = Math.max(1, Math.ceil(fullText.length / 3000));
      } else if (ext === "pptx") {
        fullText = await extractPptx(buf);
        pageCount = Math.max(1, fullText.split("---").length);
      } else {
        // PDF (default)
        if (!window.pdfjsLib) {
          await loadScript(PDFJS);
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }
        const pdf = await window.pdfjsLib.getDocument({data:buf}).promise;
        pageCount = pdf.numPages;
        const pagesTxt = [];
        for (let p=1; p<=pdf.numPages; p++) {
          const page = await pdf.getPage(p);
          const tc = await page.getTextContent();
          const sorted = [...tc.items].sort((a,b)=>b.transform[5]-a.transform[5]);
          const lines=[]; let lastY=null; let cur=[];
          for (const item of sorted) {
            const y=Math.round(item.transform[5]);
            if(lastY===null||Math.abs(y-lastY)>4){if(cur.length)lines.push(cur.join(" ").trim());cur=[item.str];lastY=y;}
            else cur.push(item.str);
          }
          if (cur.length) lines.push(cur.join(" ").trim());
          pagesTxt.push(lines.filter(l=>l.trim()).join("\n"));
        }
        fullText = pagesTxt.filter(tx=>tx.length>0).join("\n\n---\n\n").trim();
      }

      if (fullText.length < 50) { setModal({type:"pdfError",msg:t?.importNoText||"Konnte keinen auswertbaren Text extrahieren."}); return; }

      setModal({type:"pdfLoading", stage:"generate", info:`${pageCount} ${pageCount===1?"Seite":"Seiten"} · Gemini erstellt Karteikarten…`});
      const {data, error} = await sb.functions.invoke("generate-cards", {
        body: { text: fullText }
      });
      if (error) { setModal({type:"pdfError",msg:`Fehler bei KI-Generierung: ${error.message||error}`}); return; }
      const cards = data?.cards || [];
      if (!cards.length) { setModal({type:"pdfError",msg:data?.error||"Gemini hat keine Karten generiert."}); return; }

      // 3) Show preview modal; user confirms → insert into DB
      setModal({type:"pdfPreview", cards, sourceName:file.name, pages:pageCount});
    } catch(e) {
      setModal({type:"pdfError",msg:e.message});
    }
  };

  const confirmPDFImport = async (approvedCards) => {
    if (!approvedCards.length || !sel.setId) { setModal(null); return; }
    const now = new Date().toISOString();
    const rows = approvedCards.map(c => ({
      id:uid(), user_id:user.id, set_id:sel.setId,
      question_html:`<p>${esc(c.q)}</p>`,
      answer_html:`<p>${esc(c.a)}</p>`,
      last_rating:null, mcq_options:null, created_at:now,
    }));
    await sb.from("cards").insert(rows);
    setData(d=>({...d,cards:[...d.cards,...rows.map(r=>({id:r.id,setId:r.set_id,questionHtml:r.question_html,answerHtml:r.answer_html,lastRating:null,mcqOptions:null,createdAt:r.created_at}))]}));
    setModal({type:"pdfDone", count:rows.length});
  };

  // Remove my own access to every set someone has shared with me.
  // Deletes all set_shares rows where I am the invited email. RLS on the
  // server should allow invitees to delete their own share rows.
  const removeAllSharedAccess = async () => {
    const myEmail = (user.email || "").toLowerCase();
    const {error} = await sb.from("set_shares").delete().eq("invited_email", myEmail);
    if (error) { alert("Konnte nicht entfernen: " + error.message); return; }
    setSel({folderId:null, setId:null});
    loadAll();
  };

  // Shared sets are grouped into virtual folders — ONE per source folder
  // on the sharer's side. The receiver sees each shared folder as its own
  // tile with the original name and color, plus a small "Geteilt mit mir"
  // label. Legacy shares without source metadata fall back into a single
  // "Geteilt mit mir" bucket.
  const sharedSets = data.sets.filter(s => s.isSharedWithMe);
  const ownedSets = data.sets.filter(s => !s.isSharedWithMe);
  const set = data.sets.find(s=>s.id===sel.setId);
  const setCCards = data.cards.filter(c=>c.setId===sel.setId);
  const enrichFolder = f => {
    const children = data.folders.filter(cf=>cf.parentId===f.id);
    const childSets = children.flatMap(cf=>ownedSets.filter(s=>s.folderId===cf.id));
    const directSets = ownedSets.filter(s=>s.folderId===f.id);
    const allSets = [...directSets, ...childSets];
    const fc = data.cards.filter(c=>allSets.some(s=>s.id===c.setId));
    const enrichedChildren = children.map(cf=>{
      const cfs=ownedSets.filter(s=>s.folderId===cf.id); const cfc=data.cards.filter(c=>cfs.some(s=>s.id===c.setId));
      return {...cf, setCount:cfs.length, cardCount:cfc.length, progress:calcProgress(cfc), children:[]};
    });
    return {...f, setCount:allSets.length, cardCount:fc.length, progress:calcProgress(fc), children:enrichedChildren};
  };
  const rootFolders = data.folders.filter(f=>!f.parentId).map(enrichFolder);
  const sharedFolders = [];
  if (sharedSets.length > 0 && !hideShared) {
    const groups = new Map();
    for (const s of sharedSets) {
      const key = s.sourceFolderId || "__unknown";
      if (!groups.has(key)) {
        groups.set(key, {
          id: "__shared_" + key,
          name: s.sourceFolderName || "Geteilt mit mir",
          color: s.sourceFolderColor || "#C2410C",
          parentId: null,
          parentFolderName: s.parentFolderName || null,
          parentFolderColor: s.parentFolderColor || null,
          isVirtualShared: true,
          sourceFolderId: s.sourceFolderId || null,
          sets: [],
          sharers: new Set(),
        });
      }
      const g = groups.get(key);
      g.sets.push(s);
      if (s.sharedBy) g.sharers.add(s.sharedBy.toLowerCase());
    }
    for (const g of groups.values()) {
      const fc = data.cards.filter(c => g.sets.some(s => s.id === c.setId));
      sharedFolders.push({...g, sharers: Array.from(g.sharers), setCount: g.sets.length, cardCount: fc.length, progress: calcProgress(fc)});
    }
    // Group shared folders by parent folder name (if present).
    // Folders with a parentFolderName get nested under a virtual parent group;
    // those without appear at root level.
    sharedFolders.sort((a,b) => {
      if (a.sourceFolderId && !b.sourceFolderId) return -1;
      if (!a.sourceFolderId && b.sourceFolderId) return 1;
      return a.name.localeCompare(b.name, "de");
    });
    const parentGroups = new Map();
    const topLevelShared = [];
    for (const sf of sharedFolders) {
      if (sf.parentFolderName) {
        if (!parentGroups.has(sf.parentFolderName)) {
          parentGroups.set(sf.parentFolderName, {
            id:"__sparent_"+sf.parentFolderName,
            name:sf.parentFolderName,
            color:sf.parentFolderColor||"#C2410C",
            isVirtualShared:true,
            isParentGroup:true,
            children:[], sets:[], sharers:[],
            setCount:0, cardCount:0, progress:0
          });
        }
        parentGroups.get(sf.parentFolderName).children.push(sf);
      } else {
        topLevelShared.push(sf);
      }
    }
    for (const pg of parentGroups.values()) {
      const allCards = data.cards.filter(c=>pg.children.some(sf=>sf.sets.some(s=>s.id===c.setId)));
      pg.setCount = pg.children.reduce((s,f)=>s+f.setCount,0);
      pg.cardCount = allCards.length;
      pg.progress = calcProgress(allCards);
      pg.sharers = [...new Set(pg.children.flatMap(f=>f.sharers))];
      rootFolders.push(pg);
    }
    rootFolders.push(...topLevelShared);
  }
  const isViewingShared = sel.folderId && String(sel.folderId).startsWith("__shared_");
  const currentSharedFolder = isViewingShared ? sharedFolders.find(f => f.id === sel.folderId) : null;
  const folder = isViewingShared
    ? currentSharedFolder
    : data.folders.find(f=>f.id===sel.folderId);
  const folderSets = isViewingShared
    ? (currentSharedFolder?.sets || [])
    : ownedSets.filter(s=>s.folderId===sel.folderId);

  if (studyMode) {
    const Exit=()=>{studyHasProgress.current=false;setStudyMode(null);};
    const sessionInfo = {name: studyMode.sourceName};
    const markProgress=()=>{studyHasProgress.current=true;};
    return <>
      {confirmGoHome && <ConfirmOverlay title={t.abortStudy} sub={t.abortStudySub} confirmLabel={t.abortStudyYes} cancelLabel={t.continueStudy} onConfirm={()=>{studyHasProgress.current=false;confirmGoHomeYes();}} onCancel={()=>setConfirmGoHome(false)}/>}
      {studyMode.mode==="flash" ? <FlashMode set={sessionInfo} cards={studyMode.cards} onExit={Exit} onGoHome={goHome} onRate={updateCardRating} onProgress={markProgress} t={t}/> : <MCQMode set={sessionInfo} cards={studyMode.cards} onExit={Exit} onGoHome={goHome} onRate={updateCardRating} onCacheMCQ={cacheCardMCQ} onProgress={markProgress} t={t}/>}
    </>;

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {mobile&&menuOpen&&<div className="mob-overlay" onClick={()=>setMenuOpen(false)}></div>}
      <aside className={"hb-aside"+(mobile&&menuOpen?" open":"")} style={{width:!mobile&&sideCollapsed?60:"var(--sw)",minWidth:!mobile&&sideCollapsed?60:"var(--sw)",height:"100vh",background:"var(--sidebar-bg)",backdropFilter:"blur(26px) saturate(150%)",WebkitBackdropFilter:"blur(26px) saturate(150%)",borderRight:"1px solid rgba(245,99,26,.12)",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"inset -1px 0 0 var(--glass-bdr)",transition:mobile?"transform .28s ease":"width .2s ease,min-width .2s ease"}}>
        {/* ── Sidebar header ── */}

          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,padding:"16px 8px 12px",borderBottom:"1px solid rgba(245,99,26,.12)",background:"var(--sidebar-hdr)"}}>
            <button onClick={goHome} title="Zur Übersicht" style={{border:"none",padding:0,cursor:"pointer",fontSize:24,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}><Star spin/></button>

              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        ) : (
          <div style={{padding:"20px 18px 16px",borderBottom:"1px solid rgba(245,99,26,.12)",background:"var(--sidebar-hdr)",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:6}}>
            <div style={{overflow:"hidden",flex:1,minWidth:0}}>
              <button onClick={goHome} title="Zur Übersicht" style={{display:"block",border:"none",background:"none",padding:0,cursor:"pointer",fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:22,letterSpacing:"-.3px",textAlign:"left",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundImage:"var(--grad)",whiteSpace:"nowrap"}}>Heribert <Star spin/></button>
              <div style={{fontSize:13,color:"var(--muted)",marginTop:4}}>{t.hello}, <b style={{color:"var(--text)"}}>{userName.split(" ")[0]}</b> 👋</div>
            </div>
            {!mobile && <button onClick={()=>setSideCollapsed(true)} title="Sidebar einklappen" style={{border:"none",background:"none",cursor:"pointer",padding:4,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted2)",borderRadius:6,transition:"all .15s",flexShrink:0,marginTop:2}} onMouseEnter={e=>e.currentTarget.style.color="var(--orange)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted2)"}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
            </button>}
          </div>
        )}
        <div style={{flex:1,overflowY:"auto",padding:!mobile&&sideCollapsed?0:"10px 8px",overflow:!mobile&&sideCollapsed?"hidden":"auto"}}>{(!mobile&&sideCollapsed)?null:<div>
          <div style={{padding:"4px 8px 8px"}}>
            <div style={{position:"relative"}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" strokeWidth="2.5" style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input value={searchQuery} onChange={e=>{setSearchQuery(e.target.value);}} placeholder={t.searchFolders} style={{width:"100%",padding:"8px 10px 8px 32px",border:"1.5px solid var(--glass-bdr)",borderRadius:10,background:"var(--glass)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",fontSize:12,fontFamily:"inherit",color:"var(--text)",outline:"none",transition:"border-color .15s"}} onFocus={e=>e.currentTarget.style.borderColor="var(--orange)"} onBlur={e=>e.currentTarget.style.borderColor="var(--glass-bdr)"}/>
              {searchQuery && <button onClick={()=>setSearchQuery("")} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",color:"var(--muted2)",padding:4,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.color="var(--orange)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted2)"}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px 6px"}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--muted2)",letterSpacing:".08em",textTransform:"uppercase"}}>{t.learningAreas}</div>
            {sharedFolders.length>0 && <div style={{display:"flex",gap:2}}>
              {[["all",t.all],["own","📁"],["shared","🔗"]].map(([k,lbl])=>(
                <button key={k} onClick={()=>setSideFilter(k)} title={k==="all"?"Alle anzeigen":k==="own"?"Nur eigene":"Nur geteilte"} style={{padding:"2px 7px",border:"none",borderRadius:6,background:sideFilter===k?"var(--glass-hover)":"transparent",color:sideFilter===k?"var(--orange)":"var(--muted2)",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{lbl}</button>
              ))}
            </div>}
          </div>
          {loading ? <div style={{padding:"12px 10px",color:"var(--muted2)",fontSize:13,display:"flex",alignItems:"center",gap:8}}><ISpin c="var(--muted2)" s={16}/> Lädt…</div>
            : rootFolders.length===0 ? <div style={{padding:"8px 10px",fontSize:13,color:"var(--muted2)"}}>{t.noFolders}</div>
            : (()=>{
                let list=sideFilter==="all"?rootFolders:sideFilter==="own"?rootFolders.filter(f=>!f.isVirtualShared):rootFolders.filter(f=>f.isVirtualShared);
                const sq=searchQuery.trim().toLowerCase();
                if(sq.length>=1) list=list.filter(f=>f.name.toLowerCase().includes(sq)||(f.children||[]).some(cf=>cf.name.toLowerCase().includes(sq)));
                return list.map(f => <React.Fragment key={f.id}>
                  <SidebarFolder folder={f} t={t} isActive={sel.folderId===f.id} onClick={()=>openFolder(f.id)} onDelete={f.isVirtualShared?null:()=>{if(confirm(`"${f.name}" ${t.deleteConfirm}`))removeFolder(f.id);}} onEdit={f.isVirtualShared?null:()=>{setEditFolder(f);setModal({type:"folder"});setMenuOpen(false);}}/>
                  {(f.children||[]).filter(cf=>!sq||cf.name.toLowerCase().includes(sq)||f.name.toLowerCase().includes(sq)).map(cf=><div key={cf.id} style={{paddingLeft:16}}><SidebarFolder folder={cf} t={t} isActive={sel.folderId===cf.id} onClick={()=>openFolder(cf.id)} onDelete={()=>{if(confirm(`"${cf.name}" ${t.deleteConfirm}`))removeFolder(cf.id);}} onEdit={()=>{setEditFolder(cf);setModal({type:"folder"});setMenuOpen(false);}}/></div>)}
                </React.Fragment>);
              })()
          }
          <button className="folder-row" onClick={()=>{setEditFolder(null);setModal({type:"folder"});setMenuOpen(false);}} style={{border:"1.5px dashed rgba(245,99,26,.3)",color:"var(--muted)",fontSize:13,marginTop:6}}>
            <IPlus/> {t.newFolder}
          </button>
        </div>}</div>
        <div className="hb-sidebar-footer">
          {!mobile&&sideCollapsed ? (
            <div style={{display:"flex",justifyContent:"center",padding:"8px 0"}}>
              <div onClick={()=>setProfileOpen(true)} style={{cursor:"pointer"}}><Avatar url={avatarUrl} name={userName} size={36}/></div>
            </div>
          ) : (
            <button className="folder-row" onClick={()=>setProfileOpen(true)} style={{width:"100%",justifyContent:"flex-start"}}>
              <Avatar url={avatarUrl} name={userName} size={32}/>
              <div style={{flex:1,overflow:"hidden"}}>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{userName}</div>
                <div style={{fontSize:11,color:"var(--muted2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.email}</div>
              </div>
              <button className="btn-danger" onClick={e=>{e.stopPropagation();onLogout();}} style={{padding:"4px 6px"}}><ILogout/></button>
            </button>
          )}
        </div>
      </aside>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div className="mob-topbar"><button onClick={()=>setMenuOpen(true)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text)",padding:4,display:"flex"}}><IMenu/></button><button onClick={goHome} style={{border:"none",background:"none",padding:0,cursor:"pointer",fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:18,flex:1,textAlign:"left",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundImage:"var(--grad)"}}>Heribert <Star spin/></button><div onClick={()=>setProfileOpen(true)} style={{cursor:"pointer"}}><Avatar url={avatarUrl} name={userName} size={32}/></div></div>
        <main className="hb-main" style={{flex:1,overflowY:"auto",padding:"40px 48px",background:"var(--grad-bg)"}}>

        {loadError ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16,padding:20,textAlign:"center"}}>
          <div style={{fontSize:42}}>⚠️</div>
          <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:18,color:"var(--text)"}}>{ t.loadError}</div>
          <div style={{fontSize:13,color:"var(--muted)",maxWidth:420,lineHeight:1.5}}>{loadError}</div>
          <div style={{fontSize:12,color:"var(--muted2)",maxWidth:420,lineHeight:1.5}}>{t.loadErrorSub}</div>
          <button className="btn-o" onClick={()=>loadAll()}>{t.retry}</button>
        </div> : loading ? <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",gap:12,color:"var(--muted)"}}><ISpin/><span style={{fontSize:15}}>{t.loading}</span></div> : <>
          {!sel.folderId && <HomeView userName={userName} data={data} rootFolders={rootFolders} onSelectFolder={openFolder} t={t} lang={lang}/>}
          {sel.folderId && !sel.setId && (
            <FolderView folder={folder} sets={folderSets} data={data} t={t}
              onBack={()=>setSel({folderId:null,setId:null})} onNewSet={()=>setModal({type:"set"})}
              onSelectSet={sid=>setSel(p=>({...p,setId:sid}))}
              onLearnSet={(s,sc)=>setStudyConfig({sourceName:s.name,cards:sc,isFolder:false})}
              onLearnFolder={()=>{
                const fc = data.cards.filter(c=>folderSets.some(s=>s.id===c.setId));
                if(fc.length===0) return;
                setStudyConfig({sourceName:folder.name,cards:fc,isFolder:true});
              }}
              onDeleteSet={sid=>{if(confirm(t.setDelete))removeSet(sid);}} onRenameSet={renameSet}
              onShareFolder={()=>!isViewingShared && setModal({type:"folderShare",folderId:folder.id})}
              onEditFolder={()=>{if(!isViewingShared){setEditFolder(folder);setModal({type:"folder"});}}}/>
          )}
          {sel.setId && (
            <SetView set={set} folder={folder} cards={setCCards} t={t}
              onBack={()=>setSel(p=>({...p,setId:null}))} onNewCard={()=>setModal({type:"card"})}
              onEditCard={c=>{setEditCard(c);setModal({type:"card"});}} onDeleteCard={removeCard}
              onCopyCard={c=>setModal({type:"cardAction",card:c,action:"copy"})}
              onMoveCard={c=>setModal({type:"cardAction",card:c,action:"move"})}
              onLearn={()=>setStudyConfig({sourceName:set.name,cards:setCCards,isFolder:false})}
              onImportPDF={importPDF}
              onExport={()=>setModal({type:"export"})}
              onRenameSet={name=>renameSet(sel.setId,name)}/>
          )}
        </>}
      </main>
      </div>

      {studyConfig && <StudyConfigModal config={studyConfig} t={t} onStart={cfg=>{
        const pool = cfg.cards || studyConfig.cards;
        const picked = pickStudyCards(pool, cfg.count);
        setStudyConfig(null);
        setStudyMode({sourceName:studyConfig.sourceName, cards:picked, mode:cfg.mode});
      }} onClose={()=>setStudyConfig(null)}/>}
      {profileOpen && <ProfileModal
        user={user}
        userName={userName}
        onLogout={onLogout}
        onClose={()=>setProfileOpen(false)}
        hideShared={hideShared}
        setHideShared={setHideShared}
        hasSharedFolders={sharedSets.length > 0}
        onRemoveAllShared={removeAllSharedAccess}
        t={t} lang={lang} setLang={setLang}/>}
      {modal?.type==="folder" && <FolderModal initial={editFolder} folders={data.folders} t={t} onSave={(name,color,parentId)=>{editFolder?updateFolder(editFolder.id,name,color,parentId):createFolder(name,color,parentId);setEditFolder(null);}} onClose={()=>{setModal(null);setEditFolder(null);}}/>}
      {modal?.type==="set" && <SetModal onSave={createSet} onClose={()=>setModal(null)} t={t}/>}
      {modal?.type==="card" && <CardModal card={editCard} saving={saving} t={t} onSave={c=>{saveCard(c);setEditCard(null);}} onClose={()=>{setModal(null);setEditCard(null);}}/>}
      {modal?.type==="folderShare" && <FolderShareModal t={t}
        folder={data.folders.find(x=>x.id===modal.folderId)}
        allFolders={data.folders}
        folderSets={data.sets.filter(s=>!s.isSharedWithMe && s.folderId===modal.folderId)}
        ownerEmail={user.email}
        ownerId={user.id}
        ownerAvatar={avatarUrl}
        ownerName={userName}
        onClose={()=>{setModal(null);loadAll();}}/>}
      {modal?.type==="pdfLoading" && <SimpleModal title="📄 PDF verarbeiten" onClose={undefined}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"8px 0 4px"}}>
          <ISpin s={32}/>
          <div style={{fontSize:14,color:"var(--text)",textAlign:"center",fontWeight:500}}>{modal.info}</div>
          <div style={{fontSize:12,color:"var(--muted2)",textAlign:"center",lineHeight:1.5}}>{modal.stage==="extract" ? "Text wird aus dem PDF extrahiert…" : "Kann bei großen PDFs 10-30 Sekunden dauern."}</div>
        </div>
      </SimpleModal>}
      {modal?.type==="pdfPreview" && <PDFPreviewModal cards={modal.cards} sourceName={modal.sourceName} pages={modal.pages} onConfirm={confirmPDFImport} onClose={()=>setModal(null)}/>}
      {modal?.type==="pdfDone" && <SimpleModal title="📄 Import fertig" onClose={()=>setModal(null)}>
        <p style={{color:"var(--muted)",fontSize:14,marginBottom:20}}>{modal.count} Karten zu deinem Set hinzugefügt. Du kannst jetzt lernen oder einzelne Karten bearbeiten.</p>
        <button className="btn-o" onClick={()=>setModal(null)} style={{justifyContent:"center"}}>Super!</button>
      </SimpleModal>}
      {modal?.type==="pdfError" && <SimpleModal title="⚠️ PDF-Fehler" onClose={()=>setModal(null)}>
        <p style={{color:"var(--muted)",fontSize:14,marginBottom:20,whiteSpace:"pre-wrap"}}>{modal.msg}</p>
        <button className="btn-g" onClick={()=>setModal(null)}>Schließen</button>
      </SimpleModal>}
      {modal?.type==="export" && set && <ExportModal set={set} cards={setCCards} onClose={()=>setModal(null)} t={t}/>}
      {modal?.type==="cardAction" && <CardActionModal
        card={modal.card}
        action={modal.action}
        sets={data.sets.filter(s=>!s.isSharedWithMe)}
        folders={data.folders}
        currentSetId={sel.setId}
        onConfirm={async(targetSetId)=>{
          if(modal.action==="copy") await copyCard(modal.card,targetSetId);
          else await moveCard(modal.card,targetSetId);
          setModal(null);
        }}
        onClose={()=>setModal(null)}
        t={t}/>}
    </div>
  );
}

// \u2500\u2500\u2500 FOLDER VIEW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function FolderView({folder,sets,data,onBack,onNewSet,onSelectSet,onLearnSet,onLearnFolder,onDeleteSet,onRenameSet,onShareFolder,onEditFolder,t}) {
  const isShared = folder?.isVirtualShared;
  const folderCards = data.cards.filter(c=>sets.some(s=>s.id===c.setId));
  const folderProg = calcProgress(folderCards);
  const [setSearch,setSetSearch]=useState("");
  // For shared folders: resolve the list of sharers (one folder can
  // theoretically carry legacy shares from multiple people if they all
  // happened to share a folder named "Unknown" — normally a single sharer).
  const sharers = isShared ? (folder?.sharers || []) : [];
  const primarySharer = sharers[0] || null;
  const sharerProfile = null; // profiles table removed — cross-user avatars show initials
  const sharerName = sharerProfile?.display_name || primarySharer || null;
  return (
    <div className="au">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:16}}>
        <div style={{flex:1,minWidth:260}}>
          <button style={{display:"flex",alignItems:"center",gap:6,border:"none",background:"none",color:"var(--muted)",fontSize:14,cursor:"pointer",fontFamily:"inherit",marginBottom:12,padding:"4px 0"}} onClick={onBack}><IBack/> {t.back}</button>
          {isShared && (
            <div style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,fontWeight:600,color:"var(--shared-fg)",background:"var(--shared-bg)",border:"1px solid var(--shared-border)",borderRadius:99,padding:"3px 10px",marginBottom:10,textTransform:"uppercase",letterSpacing:".06em"}}>🔗 {t.sharedWithMe}</div>
          )}
          <h1 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:30,display:"flex",alignItems:"center",gap:12,letterSpacing:"-.5px"}}>
            {!isShared && onEditFolder
              ? <span onClick={onEditFolder} title={t.editFolder} style={{cursor:"pointer",display:"inline-flex",borderRadius:10,padding:"2px 4px",transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background="var(--glass-hover)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><FolderMark mark={folder?.color} size={34}/></span>
              : <FolderMark mark={folder?.color} size={34}/>}
            {!isShared && onEditFolder
              ? <span onClick={onEditFolder} title={t.editFolder} style={{cursor:"pointer",borderRadius:8,padding:"2px 6px",transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background="var(--glass-hover)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{folder?.name}</span>
              : folder?.name}
          </h1>
          <div style={{color:"var(--muted)",fontSize:14,marginTop:6}}>{sets.length} {t.sets} · {folderCards.length} {t.cardsCount}{folderCards.length>0 && <> · <span style={{color:"var(--rose)",fontWeight:600}}>{folderProg}%</span></>}</div>
          {isShared && sharerName && (
            <div style={{display:"inline-flex",alignItems:"center",gap:8,marginTop:10,padding:"5px 12px 5px 6px",background:"var(--shared-bg)",border:"1px solid var(--shared-border)",borderRadius:99,fontSize:12,color:"var(--shared-fg)",fontWeight:500}}>
              <Avatar url={sharerProfile?.avatar_url} name={sharerName} size={22}/>
              <span>geteilt von <b>{sharerName}</b>{sharers.length>1 && <> & {sharers.length-1} weitere</>}</span>
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {sets.length>0 && <SearchInput value={setSearch} onChange={setSetSearch} placeholder={t.searchSets} inline/>}
          {folderCards.length>0 && <button className="btn-o" onClick={onLearnFolder}><IBook/> {t.learnFolder}</button>}
          {!isShared && <button className="btn-sm" onClick={onShareFolder}><IShare/> {t.share}</button>}
          {!isShared && <button className="btn-g" onClick={onNewSet}><IPlus/> {t.newSet}</button>}
        </div>
      </div>
      {(()=>{
        const filtered=setSearch.trim().length>=1?sets.filter(s=>s.name.toLowerCase().includes(setSearch.trim().toLowerCase())):sets;
        return filtered.length===0 && sets.length===0
          ? <EmptyState icon={isShared?"👥":"📚"} title={isShared?t.sharedWithMe:t.noSets} sub={isShared?t.sharedWithMe:t.noSetsSub} btnLabel={isShared?null:"+ "+t.newSet} onBtn={isShared?null:onNewSet}/>
          : filtered.length===0
            ? <div style={{padding:"20px 0",color:"var(--muted)",fontSize:14,textAlign:"center"}}>{t.noSearchResults}</div>
            : <div className="hb-g-sets" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:16}}>
                {filtered.map(s => { const sc=data.cards.filter(c=>c.setId===s.id); return <SetCard key={s.id} set={s} t={t} cardCount={sc.length} progress={calcProgress(sc)} onClick={()=>onSelectSet(s.id)} onLearn={()=>onLearnSet(s,sc)} onDelete={()=>onDeleteSet(s.id)} onRename={name=>onRenameSet(s.id,name)}/>; })}
              </div>;
      })()}
    </div>
  );
}

// \u2500\u2500\u2500 SET VIEW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function SetView({set,folder,cards,onBack,onNewCard,onEditCard,onDeleteCard,onCopyCard,onMoveCard,onLearn,onImportPDF,onExport,onRenameSet,t}) {
  const prog = calcProgress(cards);
  const readOnly = set?.isSharedWithMe && !set?.canEdit;
  const [editing,setEditing]=useState(false);
  const [name,setName]=useState(set?.name||"");
  const [cardSearch,setCardSearch]=useState("");
  const nameRef=useRef();
  useEffect(()=>{setName(set?.name||"");},[set?.name]);
  useEffect(()=>{if(editing)nameRef.current?.focus();},[editing]);
  const commitName=()=>{setEditing(false);if(name.trim()&&name.trim()!==set?.name&&onRenameSet)onRenameSet(name.trim());};
  return (
    <div className="au">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:28,flexWrap:"wrap",gap:14}}>
        <div>

function SetCard({set,cardCount,progress,onClick,onLearn,onDelete,onRename,t}){
  const [editing,setEditing]=useState(false); const [name,setName]=useState(set.name); const ref=useRef();
  const commit=()=>{setEditing(false);if(name.trim()&&name.trim()!==set.name)onRename(name.trim());};
  useEffect(()=>{if(editing)ref.current?.focus();},[editing]);
  const readOnly = set.isSharedWithMe && !set.canEdit;
  // Sharing is managed at the folder level, so we don't show sharer info
  // on individual set cards — just mark the card as read-only.
  return (<div className="card-hover glass-card" style={{background:readOnly?"radial-gradient(ellipse 120% 90% at 100% 115%,rgba(194,65,12,.18) 0%,rgba(194,65,12,.06) 40%,transparent 65%),var(--card-bg-shared)":"radial-gradient(ellipse 120% 90% at 100% 115%,rgba(245,99,26,.20) 0%,rgba(245,99,26,.06) 40%,transparent 65%),var(--card-bg)",border:readOnly?"1px solid rgba(194,65,12,.22)":"1px solid rgba(245,99,26,.16)",borderRadius:"var(--r-md)",padding:"18px 18px 14px",cursor:"pointer"}} onClick={editing?undefined:onClick}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
      <div style={{flex:1,marginRight:10,paddingTop:2}}>
        {editing && !readOnly ? <input className="inline-edit" ref={ref} value={name} onChange={e=>setName(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}} onClick={e=>e.stopPropagation()} style={{fontSize:15,fontWeight:600,width:"100%"}}/>
          : <div style={{fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:15,lineHeight:1.4}} onDoubleClick={readOnly?undefined:(e=>{e.stopPropagation();setEditing(true);})}>{set.name}</div>}
        <div style={{fontSize:12,color:"var(--muted)",marginTop:5}}>{cardCount} {t.cardsCount}{readOnly && <span style={{marginLeft:6,color:"var(--shared-fg)",fontWeight:600}}>· {t.readOnly}</span>}</div>
      </div>

    <div style={{display:"flex",gap:6,alignItems:"center"}} onClick={e=>e.stopPropagation()}>
      <button className="btn-o-sm" style={{flex:1,minHeight:34}} onClick={onLearn} disabled={cardCount===0}>{t.learn}</button>

        <button className="icon-btn" onClick={e=>{e.stopPropagation();onDelete();}}><ITrash/></button>
      </>}
    </div>
  </div>);
}

function CardRow({card,onEdit,onDelete,onCopy,onMove,readOnly,t}) {
  const [open,setOpen]=useState(false);

  const ri=card.lastRating!=null?RATINGS[card.lastRating]:null;
  // Close menu on outside click
  useEffect(()=>{
    if(!menuOpen)return;
    const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);};
    document.addEventListener("click",h,true);

}

  {key:"hard",   emoji:"😰",label:"Schwer",    color:"#DC2626",tint:"rgba(220,38,38,.14)"},
  {key:"ok",     emoji:"😐",label:"Ok",        color:"#F59E0B",tint:"rgba(245,158,11,.18)"},
  {key:"good",   emoji:"🙂",label:"Gut",       color:"#F5631A",tint:"rgba(245,99,26,.16)"},
  {key:"super",  emoji:"😎",label:"Super",     color:"#16A34A",tint:"rgba(34,197,94,.16)"},
];
const cardFilterKey = c => c.lastRating==null ? "unrated" : ["hard","ok","good","super"][c.lastRating];

  const [mode,setMode]=useState("flash");

  const counts = useMemo(()=>{
    const m = {unrated:0,hard:0,ok:0,good:0,super:0};
    for (const c of config.cards) m[cardFilterKey(c)]++;
    return m;
  },[config.cards]);
  const filtered = useMemo(()=>config.cards.filter(c=>active.has(cardFilterKey(c))),[config.cards,active]);
  const total=filtered.length;
  const [count,setCount]=useState(suggestedCount(config.cards.length));
  // Keep count within [1, total] whenever the filter changes
  useEffect(()=>{ setCount(p => total===0 ? 0 : Math.min(Math.max(p,1),total)); },[total]);
  const isFolder = !!config.isFolder;
  const toggle = k => setActive(p => {
    const n = new Set(p);
    n.has(k) ? n.delete(k) : n.add(k);
    // Don't allow empty selection — re-select the one they tried to turn off

    return n;

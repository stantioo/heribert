function FolderShareModal({folder,allFolders,folderSets,ownerEmail,ownerId,ownerAvatar,ownerName,onClose,t}) {
  // A folder is "shared with email E" if any set in the folder has a
  // set_shares row for E. We aggregate across all sets in the folder so the
  // user can manage sharing at the folder level.
  const [rows,setRows]=useState([]);
  const [pMap,setPMap]=useState({});
  const [email,setEmail]=useState("");
  const [canEdit,setCanEdit]=useState(false);
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");
  const [loading,setLoading]=useState(true);
  const [busy,setBusy]=useState(false);

  const setIds = folderSets.map(s=>s.id);

  const load = async () => {
    setLoading(true);
    if (setIds.length === 0) { setRows([]); setLoading(false); return; }
    const {data, error} = await sb.from("set_shares").select("*").in("set_id", setIds).order("created_at",{ascending:false});
    if (!error) {
      setRows(data||[]);
      const emails = Array.from(new Set((data||[]).map(r=>(r.invited_email||"").toLowerCase()).filter(Boolean)));
      if (emails.length) {
        try {
          const {data:pr} = await sb.from("profiles").select("email,avatar_url,display_name").in("email",emails);
          const m = {}; for (const p of (pr||[])) m[(p.email||"").toLowerCase()] = p;
          setPMap(m);
        } catch {}
      }
    }
    setLoading(false);
  };
  useEffect(()=>{ if(folder) load(); }, [folder?.id, folderSets.length]);

  const grouped = (() => {
    const m = new Map();
    for (const r of rows) {
      const key = (r.invited_email||"").toLowerCase();
      if (!m.has(key)) m.set(key, {email:r.invited_email, createdAt:r.created_at, coverage:0, rowIds:[], canEdit:false});
      const e = m.get(key);
      e.coverage += 1;
      e.rowIds.push(r.id);
      if (r.can_edit) e.canEdit = true;
      if (new Date(r.created_at) < new Date(e.createdAt)) e.createdAt = r.created_at;
    }
    return Array.from(m.values());
  })();

  const addShare = async () => {
    setErr(""); setOk("");
    const e = email.trim().toLowerCase();
    if (!e || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) { setErr("Bitte gültige E-Mail-Adresse eingeben."); return; }
    if (e === (ownerEmail||"").toLowerCase()) { setErr("Du kannst dich nicht selbst einladen."); return; }
    if (grouped.some(g => (g.email||"").toLowerCase() === e && g.coverage === setIds.length)) { setErr("Diese E-Mail hat bereits Zugriff auf den gesamten Ordner."); return; }
    if (setIds.length === 0) { setErr("Dieser Ordner hat noch keine Sets zum Teilen."); return; }
    setBusy(true);
    const existingSetIds = new Set(rows.filter(r => (r.invited_email||"").toLowerCase()===e).map(r=>r.set_id));
    // Include denormalized folder metadata so invitees can see the original folder.
    // If these columns don't exist yet, we retry without them.
    const baseRows = setIds.filter(sid => !existingSetIds.has(sid)).map(sid => ({set_id:sid, invited_email:e, owner_email:ownerEmail, owner_id:ownerId, can_edit:canEdit}));
    if (baseRows.length === 0) { setBusy(false); setErr("Diese E-Mail hat bereits Zugriff."); return; }
    const parentFolder = folder.parentId ? allFolders.find(f=>f.id===folder.parentId) : null;
    const withMeta = baseRows.map(r => ({...r, folder_id:folder.id, folder_name:folder.name, folder_color:folder.color, ...(parentFolder ? {parent_folder_name:parentFolder.name, parent_folder_color:parentFolder.color} : {})}));
    let {error} = await sb.from("set_shares").insert(withMeta);
    if (error) {
      // Fallback: schema might not have parent_folder_* columns yet
      const withFolderOnly = baseRows.map(r => ({...r, folder_id:folder.id, folder_name:folder.name, folder_color:folder.color}));
      ({error} = await sb.from("set_shares").insert(withFolderOnly));
      if (error) {
        // Fallback: schema without any folder_* columns
        ({error} = await sb.from("set_shares").insert(baseRows));
      }
    }
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setEmail(""); setOk(`✓ ${e} hat jetzt Zugriff auf „${folder.name}" (${setIds.length} Set${setIds.length===1?"":"s"}).`);
    load();
  };

  const removeShare = async (invitedEmail) => {
    if (!confirm(`Zugriff für ${invitedEmail} auf „${folder.name}" entfernen?`)) return;
    const ids = rows.filter(r => (r.invited_email||"").toLowerCase() === invitedEmail.toLowerCase()).map(r=>r.id);
    if (ids.length === 0) return;
    await sb.from("set_shares").delete().in("id", ids);
    load();
  };

  if (!folder) return null;
  return (<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:480,padding:0}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"22px 26px 14px",borderBottom:"1px solid var(--border)",background:"var(--glass-hover)"}}>
      <ModalX onClose={onClose}/>
      <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:19,marginBottom:2,display:"flex",alignItems:"center",gap:8}}><FolderMark mark={folder.color} size={22}/> {t.shareFolder}</h3>
      <div style={{fontSize:13,color:"var(--muted)"}}>„{folder.name}" · {setIds.length} Set{setIds.length===1?"":"s"} — eingeladene Personen sehen alle Sets in diesem Ordner</div>
    </div>
    <div style={{padding:"18px 26px 22px"}}>
      <label style={{display:"block",fontSize:13,fontWeight:500,color:"var(--muted)",marginBottom:6}}>{t.inviteByEmail}</label>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input type="email" placeholder="name@beispiel.de" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addShare()}
          style={{flex:1,padding:"10px 14px",border:"1.5px solid var(--border)",borderRadius:11,fontSize:14,background:"var(--input-bg)",outline:"none",fontFamily:"inherit",color:"var(--text)"}}
          onFocus={e=>e.target.style.borderColor="var(--orange)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
        <button className="btn-o" onClick={addShare} disabled={busy||!email.trim()||setIds.length===0}>{busy?<ISpin c="#fff" s={16}/>:t.invite}</button>
      </div>
      <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer",fontSize:13,color:"var(--muted)",fontWeight:500}} onClick={()=>setCanEdit(p=>!p)}>
        <span style={{width:18,height:18,borderRadius:5,border:`2px solid ${canEdit?"var(--orange)":"var(--border)"}`,background:canEdit?"var(--orange)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",flexShrink:0}}>
          {canEdit && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5"><polyline points="20 6 9 17 4 12"/></svg>}
        </span>
        {t.editRights}
      </label>
      {err && <div style={{color:"var(--red)",fontSize:13,marginBottom:10,padding:"8px 12px",background:"var(--rl)",borderRadius:8}}>{err}</div>}
      {ok && <div style={{color:"var(--green)",fontSize:13,marginBottom:10,padding:"8px 12px",background:"var(--gl)",borderRadius:8}}>{ok}</div>}
      <div style={{fontSize:12,fontWeight:600,color:"var(--muted2)",textTransform:"uppercase",letterSpacing:".06em",marginTop:18,marginBottom:8}}>{t.accessList}</div>
      {loading ? <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",color:"var(--muted2)",fontSize:13}}><ISpin c="var(--muted2)" s={14}/> Lädt…</div>
        : <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"var(--glass-hover)",border:"1px solid var(--ob)",borderRadius:12,boxShadow:"0 2px 6px rgba(245,99,26,.08)"}}>
            <Avatar url={ownerAvatar} name={ownerName||ownerEmail} size={32}/>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ownerName||ownerEmail}</div>
              <div style={{fontSize:11,color:"var(--orange)",fontWeight:600}}>{t.ownerYou}</div>
            </div>
          </div>
          {grouped.length===0 ? <div style={{fontSize:13,color:"var(--muted2)",padding:"8px 2px"}}>{t.noInvites}</div>
            : grouped.map(g => {
              const partial = g.coverage < setIds.length;
              const pr = pMap[(g.email||"").toLowerCase()]||{};
              return (
              <div key={g.email} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"var(--card-bg)",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",border:"1px solid var(--glass-bdr)",borderRadius:12,boxShadow:"0 2px 6px rgba(245,99,26,.05)"}}>
                <Avatar url={pr.avatar_url} name={pr.display_name||g.email} size={32}/>
                <div style={{flex:1,overflow:"hidden"}}>
                  <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{pr.display_name||g.email}</div>
                  <div style={{fontSize:11,color:partial?"var(--amber)":"var(--muted2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.canEdit ? "Kann bearbeiten" : "Nur lesen"}{!partial && ` · ${new Date(g.createdAt).toLocaleDateString("de-DE")}`}</div>
                </div>
                <button onClick={async()=>{const nv=!g.canEdit;const upd={can_edit:nv};await Promise.all(g.rowIds.map(id=>sb.from("set_shares").update(upd).eq("id",id)));load();}} title={g.canEdit?"Auf nur-lesen setzen":"Bearbeitungsrechte geben"} style={{width:28,height:28,borderRadius:7,border:`1.5px solid ${g.canEdit?"var(--orange)":"var(--border)"}`,background:g.canEdit?"var(--orange)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .15s",flexShrink:0}}>
                  <IEdit/>
                </button>
                <button onClick={()=>removeShare(g.email)} className="icon-btn" title="Zugriff entfernen"><ITrash/></button>
              </div>);
            })}
        </div>}

      <div style={{fontSize:11,color:"var(--muted2)",lineHeight:1.6,marginTop:16,padding:"10px 12px",background:"var(--glass)",borderRadius:10}}>
        💡 Eingeladene Personen müssen sich mit derselben E-Mail-Adresse in Heribert registrieren/anmelden. Der Ordner erscheint dann bei ihnen unter „Geteilt mit mir". Über das Stift-Icon kannst du Bearbeitungsrechte pro Person ein- und ausschalten. Neue Sets werden automatisch mitgeteilt.
      </div>
    </div>
  </div></div>);
}

function PDFPreviewModal({cards,sourceName,pages,onConfirm,onClose}){
  // Selection state: track which cards user has excluded
  const [excluded,setExcluded]=useState(()=>new Set());
  const toggle = i => setExcluded(p => { const n=new Set(p); n.has(i)?n.delete(i):n.add(i); return n; });
  const included = cards.filter((_,i)=>!excluded.has(i));
  const allSelected = excluded.size === 0;
  const noneSelected = excluded.size === cards.length;

  return(<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:640,padding:0,display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"20px 24px 14px",borderBottom:"1px solid var(--border)",background:"var(--glass-hover)"}}>
      <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:19,marginBottom:4}}>📄 {cards.length} Karten generiert</h3>
      <div style={{fontSize:13,color:"var(--muted)"}}>Aus „{sourceName}" ({pages} Seite{pages===1?"":"n"}) · wähle ab, was du nicht willst</div>
    </div>
    <div style={{padding:"10px 24px 4px",borderBottom:"1px solid var(--border)",background:"var(--glass)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      <div style={{fontSize:13,color:"var(--text)"}}><b>{included.length}</b> von {cards.length} ausgewählt</div>
      <div style={{display:"flex",gap:6}}>
        <button className="btn-sm" onClick={()=>setExcluded(new Set())} disabled={allSelected}>Alle</button>
        <button className="btn-sm" onClick={()=>setExcluded(new Set(cards.map((_,i)=>i)))} disabled={noneSelected}>Keine</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 24px",maxHeight:"50vh"}}>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {cards.map((c,i)=>{
          const on=!excluded.has(i);
          return (<div key={i} onClick={()=>toggle(i)} style={{padding:"11px 13px",background:on?"var(--glass-hover)":"var(--tab-bg)",border:`1.5px solid ${on?"var(--ob)":"var(--border)"}`,borderRadius:10,cursor:"pointer",transition:"all .15s",opacity:on?1:.55}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              <div style={{width:18,height:18,marginTop:2,borderRadius:5,border:`2px solid ${on?"var(--orange)":"var(--muted2)"}`,background:on?"var(--orange)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                {on && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5"><polyline points="20 6 9 17 4 12"/></svg>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:3,lineHeight:1.4}}>{c.q}</div>
                <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5}}>{c.a}</div>
              </div>
            </div>
          </div>);
        })}
      </div>
    </div>
    <div style={{padding:"14px 24px 18px",borderTop:"1px solid var(--border)",display:"flex",gap:10,background:"var(--glass)"}}>
      <button className="btn-g" onClick={onClose}>Abbrechen</button>
      <button className="btn-o" style={{flex:1,justifyContent:"center"}} onClick={()=>onConfirm(included)} disabled={included.length===0}>{included.length===0 ? "Keine Karten ausgewählt" : `${included.length} Karten importieren`}</button>
    </div>
  </div></div>);
}

function CardActionModal({card,action,sets,folders,currentSetId,onConfirm,onClose,t}) {
  const [selected,setSelected]=useState(null);
  const isCopy = action==="copy";
  const title = isCopy ? (t?.copyCard||"Karte kopieren") : (t?.moveCard||"Karte verschieben");
  const btnLabel = isCopy ? (t?.copyHere||"Hierhin kopieren") : (t?.moveHere||"Hierhin verschieben");
  // Group sets by folder for a nice picker
  const grouped = useMemo(()=>{
    const m = new Map();
    for (const s of sets) {
      const fid = s.folderId||"__none";
      if (!m.has(fid)) {
        const f = folders.find(x=>x.id===fid);
        m.set(fid, {folder:f, sets:[]});
      }
      m.get(fid).sets.push(s);
    }
    return Array.from(m.values());
  },[sets,folders]);
  return (<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:440,padding:0}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"20px 24px 14px",borderBottom:"1px solid var(--border-soft)",background:"var(--glass-hover)"}}>
      <ModalX onClose={onClose}/>
      <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:18,marginBottom:4}}>{title}</h3>
      <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5}} dangerouslySetInnerHTML={{__html:strip(card.questionHtml).slice(0,80)||(t?.question||"Frage")}}/>
    </div>
    <div style={{padding:"14px 24px",maxHeight:"50vh",overflowY:"auto"}}>
      <div style={{fontSize:12,fontWeight:600,color:"var(--muted2)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>{t?.targetSet||"Ziel-Set wählen"}</div>
      {grouped.map(g=>(
        <div key={g.folder?.id||"none"} style={{marginBottom:14}}>
          {g.folder && <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,fontSize:12,fontWeight:600,color:"var(--muted)"}}>
            <FolderMark mark={g.folder.color} size={14}/> {g.folder.name}
          </div>}
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {g.sets.map(s=>{
              const isCurrent = s.id===currentSetId;
              const blockMove = !isCopy && isCurrent;
              const isSelected = s.id===selected;
              return (<button key={s.id} disabled={blockMove} onClick={()=>setSelected(s.id)} style={{
                display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                border:`1.5px solid ${isSelected?"var(--orange)":isCurrent?"var(--border-soft)":"var(--glass-bdr)"}`,
                borderRadius:12,
                background:isSelected?"var(--glass-hover)":"var(--card-bg)",
                cursor:isCurrent?"not-allowed":"pointer",
                opacity:blockMove?.45:1,
                transition:"all .15s",fontFamily:"inherit",textAlign:"left",fontSize:13,color:"var(--text)"
              }}>
                <IBook/> <span style={{flex:1}}>{s.name}</span>
                {isCurrent && <span style={{fontSize:11,color:"var(--muted2)"}}>{t?.currentSet||"aktuell"}</span>}
                {isSelected && <span style={{color:"var(--orange)",fontWeight:700}}>✓</span>}
              </button>);
            })}
          </div>
        </div>
      ))}
    </div>
    <div style={{padding:"14px 24px 18px",borderTop:"1px solid var(--border-soft)",display:"flex",gap:10}}>
      <button className="btn-g" onClick={onClose}>{t?.cancel||"Abbrechen"}</button>
      <button className="btn-o" style={{flex:1,justifyContent:"center"}} disabled={!selected} onClick={()=>onConfirm(selected)}>{btnLabel}</button>
    </div>
  </div></div>);
}

function ExportModal({set,cards,onClose,t}) {
  const Tile = ({icon,title,desc,hint,onClick,color}) => (
    <button onClick={onClick} style={{flex:1,minWidth:0,background:"var(--card-bg)",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",border:"1px solid rgba(245,99,26,.14)",borderRadius:"var(--r-md)",padding:"20px 18px",textAlign:"left",cursor:"pointer",fontFamily:"inherit",transition:"all .15s",display:"flex",flexDirection:"column",gap:8,boxShadow:"var(--sh-sm)"}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 8px 24px ${color}22`;}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
      <div style={{fontSize:28,lineHeight:1}}>{icon}</div>
      <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:15,color:"var(--text)"}}>{title}</div>
      <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5}}>{desc}</div>
      <div style={{fontSize:11,color:color,fontWeight:600,marginTop:"auto"}}>{hint} →</div>
    </button>
  );
  return (<div className="overlay" onClick={onClose}><div className="modal si" style={{maxWidth:520,padding:0}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"20px 24px 14px",borderBottom:"1px solid var(--border)",background:"var(--glass-hover)"}}>
      <h3 style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:18,marginBottom:2}}>{t.exportTitle}</h3>
      <div style={{fontSize:13,color:"var(--muted)"}}>{cards.length} {t.cardsCount} — „{set.name}"</div>
    </div>
    <div style={{padding:"20px 24px 24px",display:"flex",gap:12,flexWrap:"wrap"}}>
      <Tile icon="📄" title={t.exportPdf} desc={t.exportPdfSub} hint={t.exportPdfHint} color="#F5631A"
        onClick={()=>{exportSetPDF(set,cards);onClose();}}/>
      <Tile icon="📊" title={t.exportCsv} desc={t.exportCsvSub} hint={t.exportCsvHint} color="#16A34A"
        onClick={()=>{exportSetCSV(set,cards);onClose();}}/>
    </div>
  </div></div>);
}

function Inp({label,type="text",placeholder,value,onChange,onEnter}) {
  const [show,setShow]=useState(false);
  const isPw = type==="password";
  return(<div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:500,color:"var(--muted)",marginBottom:6}}>{label}</label>
    <div style={{position:"relative"}}>
      <input type={isPw && show ? "text" : type} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onEnter?.()}
        style={{width:"100%",padding:isPw?"10px 40px 10px 14px":"10px 14px",border:"1.5px solid var(--border)",borderRadius:9,fontSize:14,background:"var(--input-bg)",color:"var(--text)",outline:"none",fontFamily:"inherit",transition:"border-color .15s"}}
        onFocus={e=>e.target.style.borderColor="var(--orange)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
      {isPw && <button type="button" onClick={()=>setShow(p=>!p)} tabIndex={-1} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",padding:4,display:"flex",color:"var(--muted2)",transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="var(--orange)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted2)"}>
        {show
          ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/><path d="M14.12 14.12a3 3 0 11-4.24-4.24"/></svg>
          : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>}
      </button>}
    </div>
  </div>);
}

function SearchInput({value,onChange,placeholder,inline}) {
  return <div style={{position:"relative",marginBottom:inline?0:16,flex:inline?"0 1 auto":undefined}}>
    <svg width={inline?12:14} height={inline?12:14} viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" strokeWidth="2.5" style={{position:"absolute",left:inline?10:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:inline?140:"100%",maxWidth:inline?200:360,padding:inline?"7px 28px 7px 30px":"9px 34px 9px 36px",border:"1.5px solid var(--glass-bdr)",borderRadius:inline?11:12,background:"var(--glass)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",fontSize:inline?12:13,fontFamily:"inherit",color:"var(--text)",outline:"none",transition:"all .2s"}} onFocus={e=>{e.currentTarget.style.borderColor="var(--orange)";if(inline)e.currentTarget.style.width="200px";}} onBlur={e=>{e.currentTarget.style.borderColor="var(--glass-bdr)";if(inline&&!value)e.currentTarget.style.width="140px";}}/>
    {value && <button onClick={()=>onChange("")} style={{position:"absolute",right:inline?6:10,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",color:"var(--muted2)",padding:3,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.color="var(--orange)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted2)"}><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>}
  </div>;
}
function EmptyState({icon,title,sub,btnLabel,onBtn}) {
  return(<div style={{textAlign:"center",padding:"60px 20px",color:"var(--muted)"}}>
    <div style={{fontSize:48,marginBottom:12}}>{icon}</div>
    <div style={{fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:18,color:"var(--text)",marginBottom:8}}>{title}</div>
    <div style={{fontSize:14,marginBottom:24,maxWidth:320,margin:"0 auto 24px"}}>{sub}</div>
    {onBtn&&btnLabel&&<button className="btn-o" onClick={onBtn}>{btnLabel}</button>}
  </div>);
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
